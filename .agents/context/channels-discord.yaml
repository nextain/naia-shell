description: End-to-end Discord integration architecture.

# ─── Core Principle ───────────────────────────────────────────────
# Naia is a LOCAL AI project. Cloud is relay only.
# - LLM processing: LOCAL (Shell Agent with full persona/memory/tools)
# - Message storage: LOCAL (Discord server retains messages natively)
# - Cloud Run bot: PURE RELAY (receive Discord msgs, forward to Shell, relay replies)
# - Cloud Run MUST NOT call LLM, store messages, or process anything.
# See: philosophy.yaml → privacy_first ("Local execution by default — cloud is opt-in")

message_pipeline:
  description: Discord message processing flow — Shell-driven, Cloud Run relay.

  pc_online:
    flow:
      - "Discord user sends DM → Discord API"
      - "Cloud Run bot (relay) receives message via discord.js WebSocket"
      - "Shell polls Cloud Run for new messages (or receives push)"
      - "Shell → Agent → LLM (full context: persona, memory, tools, history)"
      - "Agent generates response"
      - "Shell sends response to Cloud Run relay API"
      - "Cloud Run bot replies on Discord"
    constraint: "Cloud Run NEVER calls LLM. Shell does ALL processing."

  pc_offline:
    flow:
      - "Discord user sends DM → Discord API"
      - "Cloud Run bot receives but has no Shell to forward to"
      - "No response. Messages remain on Discord server."
      - "When PC comes online, Shell checks Discord history for unprocessed messages"
    constraint: "No response when PC is off. This is by design."

  token_management:
    bot_token_location: "Cloud Run env var (DISCORD_BOT_TOKEN) — never in client code"
    bot_token_backup: "my-envs/naia.nextain.io.env"
    shell_access: "Shell reads token from local config for REST API (history/DM channel)"
    gateway_discord_plugin: "DISABLED — do not use Gateway Discord plugin"
    one_connection_rule: "Discord allows ONE WebSocket per token. Cloud Run bot holds it."

cloud_run_bot:
  service: naia-discord-bot (asia-northeast3)
  role: Pure relay — receive, forward, reply. Nothing else.
  must_not:
    - Call LLM
    - Store messages
    - Process or transform content
    - Make decisions about responses
  must:
    - Maintain Discord WebSocket connection
    - Forward incoming messages to Shell (via polling API or push)
    - Accept response from Shell and reply on Discord
    - Send alert email on token expiry / connection failure
  key_files:
    - naia.nextain.io/src/lib/discord-bot.ts
    - naia.nextain.io/scripts/start-discord-bot.ts
    - naia.nextain.io/Dockerfile.discord-bot

components:
  shell:
    role: LLM processing hub — receives Discord messages, generates responses
    responsibilities:
      - Poll Cloud Run for new Discord messages
      - Process through Agent + LLM with full context (persona, memory, tools)
      - Send response back to Cloud Run for Discord delivery
      - Display Discord conversation in ChannelsTab
    key_files:
      - shell/src/components/ChannelsTab.tsx
      - shell/src/components/ChatPanel.tsx
      - shell/src/lib/discord-api.ts
      - shell/src/lib/channel-sync.ts

  agent:
    role: Skill execution layer between Shell and Gateway
    skills:
      - skill_naia_discord (send/status/history)
    event_handling:
      - channel.message / channels.message → Shell discord_message display
    key_files:
      - agent/src/skills/built-in/naia-discord.ts
      - agent/src/gateway/event-handler.ts

  naia_gateway:
    role: Local daemon for tool execution only — NOT for Discord message routing
    discord_plugin: DISABLED
    note: >
      Naia Gateway manages local tools (bash, files, etc.) and session state.
      Discord messages do NOT flow through Naia Gateway.
      Bot token in gateway.json is for Shell REST API access only,
      not for the Gateway Discord plugin.

login_channel_separation:
  description: Login and channel logic are fully separated.
  login_flow:
    - "Deep link: naia://auth?key=gw-xxx&user_id=xxx&state=xxx"
    - "No discord fields in deep link — login is provider-agnostic"
    - "Callback page issues desktop key only, no channel resolution"
  channel_flow:
    - "After naia_auth_complete, Shell calls syncLinkedChannels()"
    - "Shell fetches GET /api/gateway/linked-channels (BFF)"
    - "BFF returns: { channels: [{ type: 'discord', userId: '...' }] }"
    - "Shell persists discordDefaultUserId to config"
    - "Shell calls openDmChannel(discordUserId) → gets DM channel ID"
    - "Shell persists discordDmChannelId to config"
  key_files:
    - shell/src/lib/channel-sync.ts
    - shell/src/lib/discord-api.ts
    - shell/src/lib/discord-auth.ts
    - naia.nextain.io/src/app/api/gateway/linked-channels/route.ts

known_issues:
  - "ChatPanel.tsx:985 — discord_message is ignored (break). Should route to LLM pipeline. See #155"
  - "discord-bot.ts has callLLM() — violates relay-only principle. Must be removed. See #155"
  - "Shell → Cloud Run reply API not yet implemented. See #155"
  - "Gateway config dependency in Shell (read_discord_bot_token from gateway.json). See #154"

related_issues:
  - "#144 — Bot token expired (resolved: new token + Cloud Run deployment)"
  - "#154 — Remove OpenClaw dependency for Discord"
  - "#155 — Implement Shell-driven Discord response pipeline"
