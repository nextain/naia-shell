description: Naia distribution and release pipeline

formats:
  flatpak:
    app_id: io.nextain.naia
    manifest: flatpak/io.nextain.naia.yml
    flathub_manifest: flatpak/flathub/io.nextain.naia.yml
    metainfo: flatpak/io.nextain.naia.metainfo.xml
    desktop: flatpak/io.nextain.naia.desktop
    shared_modules: flatpak/shared-modules/ (git submodule from flathub/shared-modules)
    runtime: org.gnome.Platform//50
    sdk_extensions:
      - org.freedesktop.Sdk.Extension.rust-stable
      - org.freedesktop.Sdk.Extension.node22
    status: working
    critical_notes:
      - "MUST use 'npx tauri build --no-bundle' (NOT cargo build --release)"
      - "cargo build --release causes white screen — WebKitGTK asset protocol not configured"
      - "tauri.conf.flatpak.json overrides beforeBuildCommand to empty (frontend built separately)"
      - "deep-link scheme: x-scheme-handler/naia (NOT nanos)"
      - "@node-llama-cpp excluded from bundle (rm -rf after npm install) — saves ~650MB"
      - "naia-agent bundled at /app/lib/naia-os/agent/"
      - "Node bundled at /app/bin/node"
      - "pnpm not in PATH — use npx pnpm, npx tauri"
      - "Claude Code terminal cannot flatpak install — use desktop terminal"
      - "--own-name=io.nextain.naia.* required for single-instance D-Bus in Flatpak sandbox"
      - "tauri dev registers competing MIME handlers — local-reinstall script cleans them automatically"

  agent_build_pipeline:
    description: |
      Agent runs from shell/src-tauri/target/debug/agent/dist/index.js (pre-built).
      Vite HMR does NOT apply to agent code. After modifying agent/src/:
      1. cd agent && pnpm build (tsc → agent/dist/)
      2. cp -r agent/dist/ shell/src-tauri/target/debug/agent/dist/
      Or restart pnpm run tauri dev (auto-rebuild).
    tauri_plugins:
      - plugin-store: "Encrypted credential storage (naiaKey persistence across browser clears)"
      - plugin-shell: "Spawn agent process, open URLs"
      - plugin-deep-link: "OAuth callback (naia:// scheme)"
      - plugin-single-instance: "Prevent multiple app instances"

  appimage:
    built_by: tauri build
    status: working

  deb:
    built_by: tauri build
    status: working
    critical_notes:
      - "Linux release CI must build with src-tauri/tauri.conf.linux.json (base config does not package libvosk.so)"
      - "Do not trust CI build success alone — smoke-test extracted .deb for libvosk.so presence and ldd resolution"

  rpm:
    built_by: tauri build
    status: working

  windows:
    description: "Windows desktop app (NSIS installer with embedded frontend)"
    status: working
    build_command: "cd shell && pnpm tauri build --config src-tauri/tauri.conf.windows.json"
    output: "shell/src-tauri/target/release/bundle/nsis/Naia_{version}_x64-setup.exe"
    config_overlay: "shell/src-tauri/tauri.conf.windows.json"
    bundle_targets: ["nsis"]
    nsis_config:
      install_mode: "currentUser"
      languages: ["English", "Korean", "Japanese"]
      start_menu_folder: "Naia"
      code_signing: "not configured (SmartScreen warning on install)"
      uninstall_hooks: "not implemented — see issue #53"
    bundled_resources:
      node_exe: "resources/node.exe (downloaded at CI build time, ~45MB)"
      agent: "agent/dist + agent/node_modules (from base config)"
    wsl_requirement:
      description: "Windows app requires WSL2 + NaiaEnv distro for Gateway execution"
      tiers:
        tier_1: "No WSL/NaiaEnv — shows WslSetupScreen"
        tier_2: "WSL ready — Gateway runs inside NaiaEnv via wsl.exe"
      wsl_availability_check:
        definitive: "sc.exe query vmcompute (vmcompute service exists only after VMP activation + reboot)"
        false_positive: "wsl --version always succeeds on Win11 regardless of feature state"
        feature_state: "get_windows_feature_state() — returns Enabled/Disabled/EnablePending/None"
      provisioning_steps:
        1: "Enable VirtualMachinePlatform + Microsoft-Windows-Subsystem-Linux (temp .ps1 file + Start-Process -Verb RunAs)"
        2: "Reboot (only once — vmcompute check prevents false WSL availability)"
        3: "Download Ubuntu 24.04 rootfs from cdimage.ubuntu.com (~374MB .wsl file)"
        4: "wsl --import NaiaEnv (after verifying vmcompute service exists)"
        5: "Install Node.js 22 (NodeSource)"
        6: "Install naia-agent (npm install + build from source or prebuilt tarball)"
        7: "Set gateway.mode=local in /root/.naia/gateway.json"
        8: "Write /etc/wsl.conf (systemd=true)"
      broken_approaches:
        - "wsl --install -d Ubuntu-24.04 --no-launch — reports 'already installed' without registering"
        - "wsl --export on uninitialized distro — WSL_E_DISTRO_NOT_FOUND"
        - "Inline PowerShell -ArgumentList — mangles pipes and semicolons"
        - "Get-WindowsOptionalFeature from non-elevated Tauri — COMException"
      wsl_setup_white_screen:
        description: "WebView goes white during WSL feature activation (UAC elevation). Root cause unknown."
        workaround: |
          1. WslSetupScreen shows warning text before install (i18n: wslSetup.whiteScreenNotice)
          2. After enable_wsl_features_elevated(), show Win32 MessageBoxW (OK/Cancel)
          3. OK → register RunOnce auto-start + shutdown /r /t 3
          4. Cancel or OK → std::process::exit(0) (kills white-screened app)
          5. After reboot, app auto-starts via RunOnce registry (one-time, self-cleaning)
        files:
          - "shell/src-tauri/src/platform/windows.rs — show_native_reboot_dialog(), register_run_once()"
          - "shell/src/components/WslSetupScreen.tsx — whiteScreenNotice text"
          - "shell/src/lib/i18n.ts — wslSetup.whiteScreenNotice (14 languages)"
      gateway_spawn_flow:
        initial_startup: "spawn_gateway() → try_platform_gateway_spawn() — Skip if NaiaEnv absent"
        after_wsl_setup: "App.tsx onComplete → restartGateway() → spawn gateway in WSL"
        after_onboarding: "handleComplete() → restartGateway() → restart gateway"
        health_check: "GET http://127.0.0.1:18789/health from Windows host (WSL2 localhost forwarding)"
        health_monitor: "Started in restart_gateway if not started during initial setup"
      auto_approve_timeout:
        description: "auto_approve_pending_devices has 15s timeout to prevent restart_gateway hang"
        mechanism: "try_wait() polling loop with child.kill() on timeout"
    restart_gateway_guard:
      description: "Atomic guard prevents concurrent Gateway restarts"
      mechanism: "compare_exchange on restarting_gateway AtomicBool (SeqCst)"
      reason: "Deep link auth can trigger multiple restartGateway calls; without guard, Gateway killed mid-spawn"
      frontend_debounce: "2s debounce + inflight promise in gateway-sync.ts"
    identity_sync:
      description: "Device identity + gateway.json copied from WSL NaiaEnv to Windows ~/.naia/"
      trigger: "sync_wsl_identity_to_windows() called after auto_approve_pending_devices in both spawn + reuse paths"
      reason: "agent-core on Windows needs ~/.naia/identity/device.json for Gateway WebSocket handshake"
      files_synced:
        - "/root/.naia/identity/device.json → ~/.naia/identity/device.json"
        - "/root/.naia/gateway.json → ~/.naia/gateway.json"
    config_sync:
      description: "should_skip_gateway_sync() returns true on Windows"
      reason: "Config path is Windows-side ~/.naia/ but Gateway reads WSL /root/.naia/"
      impact: "Provider/model/API key changes from Shell UI not synced to WSL gateway"
      status: "partially mitigated — identity_sync copies initial config but runtime changes not synced"
    e2e_test:
      infra_script: "scripts/test-windows-e2e.mjs"
      app_script: "scripts/test-windows-app-e2e.mjs"
      commands:
        infra: "node scripts/test-windows-e2e.mjs [--skip-cleanup]"
        app: "node scripts/test-windows-app-e2e.mjs [--skip-cleanup]"
      infra_phases:
        1: "Verify clean state (no NaiaEnv, no .naia)"
        2: "WSL setup (rootfs download → NaiaEnv → provision)"
        3: "Gateway startup + HTTP/canvas health check (WSL + Windows host)"
        4: "Device auto-approval + config copy"
        5: "Agent ↔ Gateway handshake"
      app_phases:
        1: "Preconditions (binary exists, NaiaEnv registered, vmcompute available)"
        2: "Launch naia-shell.exe (with CAFE_DEBUG_E2E=1 for WebSocket probe)"
        3: "Wait for Gateway health from Windows host (max 120s)"
        4: "Verify Gateway status + WSL process + /health JSON details"
        5: "Verify WebSocket chain (agent-core → Gateway via skill_diagnostics probe)"
      websocket_probe:
        description: "E2E self-test sends skill_diagnostics tool_request through agent-core stdin"
        trigger: "CAFE_DEBUG_E2E=1 env var — Rust backend sends probe after Gateway+agent startup"
        verification: "E2E script checks naia.log for [E2E-DEBUG] agent_response tool_result tool=skill_diagnostics success=true"
        chain: "Rust backend → agent-core stdin → agent WebSocket → Gateway → response → agent stdout → Rust log"
      diagnostics_fix:
        description: "DiagnosticsTab no longer requires enableTools=true to check Gateway status"
        reason: "On first install, enableTools is only set after onboarding — diagnostics should always work for debugging"
        fallback: "Uses DEFAULT_GATEWAY_URL (ws://localhost:18789) when enableTools is false"
      ci_status: "manual only (requires WSL + VirtualMachinePlatform)"
    cross_platform_code:
      canonicalize: "dunce::canonicalize used in workspace.rs, panel.rs, lib.rs — removes Windows UNC prefix (\\?\\)"
      home_dir: "crate::home_dir() — HOME (Unix) or USERPROFILE (Windows)"
      platform_module: "shell/src-tauri/src/platform/{mod,windows,linux,wsl}.rs — Windows API (OpenProcess, TerminateProcess)"
      shell_commands: "panel.rs SHELL_CMD_MAP — #[cfg(unix)] Unix paths, #[cfg(windows)] C:\\Windows\\System32\\"
      workspace_root: "Empty fallback on Windows — triggers folder picker dialog (@tauri-apps/plugin-dialog)"
      terminal_shell: "WorkspaceCenterPanel.tsx — powershell on Windows, bash on Linux"
      deep_link: "platform::start_deep_link_file_watcher() — Windows file-based deep link (Chromium sandbox blocks IPC)"
    build_prerequisites:
      - "Visual Studio Build Tools 2022 (MSVC C++ workload)"
      - "CMake (for whisper.cpp native build)"
      - "LLVM (libclang for bindgen — prevents MSYS2 glibc header pollution)"
      - "Node.js 22+, pnpm"
      - "Rust stable-x86_64-pc-windows-msvc"
    build_env_vars:
      LIBCLANG_PATH: "C:/Program Files/LLVM/bin"
    dev_note: "cargo tauri dev (without --config windows) for dev mode — windows config requires bundled node.exe"
    whisper_rs: "upstream codeberg (tazz4843/whisper-rs) — NOT nextain fork. Fork decision reversed."
    pending_issues:
      - "Config sync: should_skip_gateway_sync prevents runtime provider/model sync to WSL"
      - "Gateway /health endpoint: version/methods not exposed — only available via WebSocket skill_diagnostics"
      - "tauri:dev npm script has Linux-only GDK_BACKEND=x11 — Windows must use cargo tauri dev directly"
      - "Onboarding button border invisible in light theme (rgba(255,255,255,0.08) on white)"
    ci_status: "build-windows job added to release-app.yml (NSIS + MSI + updater sig)"

  iso:
    builder: ublue-os/titanoboa@main
    type: live ISO (squashfs + ephemeral overlay)
    base_image: ghcr.io/nextain/naia-os:latest
    output_name: naia-os-live-amd64.iso
    status: working
    hook: installer/hook-post-rootfs.sh
    flatpaks: installer/flatpaks (Chrome, Discord, Firefox — baked into squashfs)
    install_method: ostreecontainer (Bazzite upstream)
    install_flow:
      summary: "hook-post-rootfs.sh generates interactive-defaults.ks with ostreecontainer directive + 4 post-scripts"
      kickstart_directives:
        - "ostreecontainer --url=<image-ref>:<tag> --transport=containers-storage --no-signature-verification"
      post_scripts:
        - install-configure-upgrade.ks: "bootc switch --mutate-in-place (registry-based updates)"
        - install-flatpaks.ks: "rsync flatpak to ostree deployment path"
        - disable-fedora-flatpak.ks: "disable flatpak-add-fedora-repos.service"
        - install-naia-customizations.ks: "copy Plasma scripts, wallpaper, lock screen, fcitx5 to installed system"
      image_ref_source: "/usr/share/ublue-os/image-info.json (fallback: ghcr.io/nextain/naia-os:latest)"
      reference_impl: "titanoboa/.github/workflows/ci_dummy_hook_postrootfs.sh (Bazzite upstream)"
    customizations:
      - Anaconda installer + Naia branding (sidebar, topbar, CSS)
      - Anaconda profile (BTRFS + zstd, Naia CSS)
      - ostreecontainer kickstart + post-scripts (Bazzite upstream 방식)
      - KDE taskbar pin (Naia prepend to Bazzite defaults, not replace)
      - fcitx5 hangul default config (Korean input)
      - Desktop wallpaper (live-wallpaper.jpg)
      - Login/lock screen background (login-background.jpg via SDDM + kscreenlocker)
      - Plymouth boot splash (start-launcher-icon.png + text-mix-naia-logo.png)
      - Live session warning dialog (kdialog, Korean)
      - Post-install customizations copied to installed system via install-naia-customizations.ks
    local_build:
      prerequisites:
        - "podman, just, xorriso (~50GB free disk)"
        - "titanoboa repo cloned at ../titanoboa"
      command: |
        cd titanoboa
        sudo HOOK_post_rootfs="$(realpath ../naia-os/installer/hook-post-rootfs.sh)" \
          just build "ghcr.io/nextain/naia-os:latest" 1 \
          "$(realpath ../naia-os/installer/flatpaks)" squashfs
      output: "work/output.iso (~7-8GB)"
      build_time: "20-40 min (depends on network + disk speed)"
      stages:
        1_pull: "podman pull base image from GHCR"
        2_rootfs: "podman export → tar extract to work/rootfs"
        3_hook: "podman --rootfs runs hook-post-rootfs.sh (Anaconda, branding, KDE, Korean, flatpaks)"
        4_container_load: "podman pull image into rootfs containers-storage (for ostreecontainer)"
        5_dracut: "generate initramfs with dmsquash-live module"
        6_squashfs: "mksquashfs rootfs → LiveOS/rootfs.img"
        7_grub: "GRUB template + xorriso → bootable ISO"
      host_notes:
        - "/var partition may be small (69GB ext4) — podman images fill it fast"
        - "Workaround: symlink root podman storage to /var/home/.containers-storage"
        - "squashfs-tools must be available (host or builder container)"
    e2e_test:
      script: os/tests/e2e-install.sh
      kickstart: os/tests/e2e-install.ks
      command: "./os/tests/e2e-install.sh --iso /path/to/output.iso --verbose --keep"
      prerequisites: "qemu-system-x86_64, xorriso, sshpass, socat, OVMF"
      test_flow: "QEMU VM → boot ISO → inject kickstart → Anaconda install → reboot → smoke tests"
    notes:
      - GHCR package must be public for image pull
      - Hook clones repo via git (repo must be public)
      - Titanoboa GRUB is hardcoded (label from os-release PRETTY_NAME)
      - CDLABEL is always 'titanoboa_boot' (not customizable)
      - Pre-installed flatpaks survive reboot (in squashfs), user data does not
      - ISO uploaded as Actions Artifact (too large for Release)
      - Artifact retention: 30 days
      - CHECKSUM file uploaded to Release draft
      - "image-info.json may return Bazzite ref instead of Naia (base image artifact)"
      - "rsync workaround patches (3b-3f) removed 2026-03-03 in favor of ostreecontainer"

release:
  current_version: v0.1.2
  assets:
    - Naia-Shell-x86_64.AppImage
    - Naia-Shell-x86_64.AppImage.sig
    - Naia-Shell-x86_64.deb
    - Naia-Shell-x86_64.rpm
    - Naia-Shell-x86_64.flatpak
    - Naia-Shell-x86_64-setup.exe
    - Naia-Shell-x86_64-setup.exe.sig
    - SHA256SUMS
    - latest.json
  naming_convention: "Version-independent filenames for stable /latest/ download URLs"
  download_page: https://naia.nextain.io/download
  download_page_repo: naia.nextain.io/
  changelog_source: releases/v*.yaml

workflows:
  release_app: .github/workflows/release-app.yml
  build_os_image: .github/workflows/build.yml
  generate_iso: .github/workflows/iso.yml

ci_pipeline:
  # Parallel
  build_linux: "tauri build (with signing) → AppImage + .sig, DEB, RPM"
  build_windows: "tauri build --config windows.json → NSIS .exe + .sig (downloads node.exe for bundling)"
  build_flatpak: "flatpak-builder → flatpak build-bundle"
  # Sequential (depends on all above)
  release: "download artifacts → release notes from YAML → latest.json (linux + windows) → SHA256SUMS → GitHub Release → itch.io butler push"
  # Triggered by release success
  generate_iso: "OCI image → bootable ISO (needs GHCR image first)"

app_update:
  mechanism: "Tauri updater plugin (Ed25519 signed — AppImage on Linux, NSIS .exe on Windows)"
  endpoint: "https://github.com/nextain/naia-os/releases/latest/download/latest.json"
  signing: "TAURI_SIGNING_PRIVATE_KEY + TAURI_SIGNING_PRIVATE_KEY_PASSWORD (CI secrets)"
  signing_key_location: "data-private/key/naia-tauri.key (private, gitignored) + naia-tauri.key.pub"
  pubkey_location: "shell/src-tauri/tauri.conf.json → plugins.updater.pubkey"
  key_setup_2026_05: "new key pair generated 2026-05-21, old key lost — update GitHub Secret TAURI_SIGNING_PRIVATE_KEY with new private key content"
  flatpak_exclusion: "FLATPAK=1 env → updater plugin not registered (Flatpak manages own updates)"
  itch_io:
    channel_linux: "nextain/naia:linux (AppImage)"
    channel_flatpak: "nextain/naia:linux-flatpak"
    channel_windows: "nextain/naia:windows (NSIS setup.exe)"
    secret: BUTLER_API_KEY
  changelog:
    source: "releases/v*.yaml (multilingual YAML)"
    consumers:
      - "CI → GitHub Release body (English)"
      - "naia.nextain.io → download page changelog (locale-matched)"
      - "In-app → Tauri updater body (English) + View Details link to web"

local_build:
  flatpak:
    prerequisites:
      - flatpak-builder installed
      - "org.gnome.Platform//50 + Sdk//50"
      - org.freedesktop.Sdk.Extension.rust-stable
      - org.freedesktop.Sdk.Extension.node22
    commands:
      clean: "rm -rf flatpak-repo build-dir .flatpak-builder"
      build: "flatpak-builder --force-clean --disable-rofiles-fuse --repo=flatpak-repo build-dir flatpak/io.nextain.naia.yml"
      bundle: "flatpak build-bundle flatpak-repo Naia-Shell-x86_64.flatpak io.nextain.naia"
      upload: "gh release upload v0.1.0 Naia-Shell-x86_64.flatpak --clobber"
    scripts:
      run: "bash scripts/flatpak-run.sh"
      reinstall_and_run: "bash scripts/flatpak-reinstall-and-run.sh (bundle + uninstall + install + run)"
      rebuild_and_run: "bash scripts/flatpak-rebuild-and-run.sh (clean + build + install + run)"
    important_notes:
      - MUST clean flatpak-repo before build to avoid 'invalid rdev' corruption
      - Old app-id artifacts (com.naia.shell) can corrupt the ostree repo
      - CI workflow includes rm -rf cleanup step before flatpak-builder
      - "NEVER use cargo build --release for Flatpak — causes white screen"
      - "ALWAYS use npx tauri build --no-bundle --config src-tauri/tauri.conf.flatpak.json"

dev_environment:
  host_os: Bazzite (Fedora Atomic + KDE Plasma)
  dev_container: Ubuntu (distrobox/toolbox)
  critical_notes:
    - "flatpak commands (install/uninstall/run) MUST run on HOST, not inside container"
    - "flatpak-reinstall-and-run.sh / flatpak-rebuild-and-run.sh MUST run on HOST terminal"
    - "flatpak-builder can run inside container, but flatpak install cannot (D-Bus socket unavailable)"
    - "Container lacks Flatpak system helper socket → 'Could not connect: No such file or directory'"
    - "Claude Code terminal = inside container → flatpak install fails here too"
    - "Use host desktop terminal (Konsole) for install/run, container terminal for build/dev"

troubleshooting:
  pnpm_store_corruption:
    symptom: |
      "Invalid package config ... Unexpected end of JSON input" or
      "ERR_INVALID_PACKAGE_CONFIG" when running pnpm dev / cargo tauri dev.
      Multiple package.json files in node_modules are 0 bytes.
    cause: |
      pnpm content-addressable store (~/.local/share/pnpm/store/v10) gets corrupted.
      pnpm uses hardlinks from store → node_modules, so corrupted store files
      produce 0-byte hardlinks on every subsequent pnpm install.
      Even pnpm store prune + pnpm install --force does NOT fix it
      because prune only removes orphans, not corrupted content files.
    diagnosis:
      - "find node_modules -name 'package.json' -empty | wc -l  # should be 0"
      - "find ~/.local/share/pnpm/store/v10 -empty -type f | wc -l  # should be ~0"
    fix: |
      rm -rf ~/.local/share/pnpm/store/v10
      rm -rf shell/node_modules agent/node_modules shell/src-tauri/target/debug/agent/node_modules
      cd shell && pnpm install
      cd agent && pnpm install
      cd shell/src-tauri/target/debug/agent && CI=true pnpm install --shamefully-hoist
    prevention: |
      If corruption recurs, use node-linker=hoisted to avoid hardlinks:
        pnpm install --config.node-linker=hoisted
      This copies files instead of hardlinking, immune to store corruption.
      Caution: hoisted layout allows phantom dependency access.
    incident: "2026-03-03 — 2300 empty files in store, affected shell + agent node_modules"

  agent_node_modules_missing_ws:
    symptom: |
      agent-core crashes with "Cannot find package 'ws'" at startup.
      Path: shell/src-tauri/target/debug/agent/node_modules/ws
    cause: |
      Bundled agent at target/debug/agent/ uses pnpm default isolated node_modules.
      ws is an indirect dependency not hoisted to top level.
    fix: |
      cd shell/src-tauri/target/debug/agent
      CI=true pnpm install --shamefully-hoist
    note: "--shamefully-hoist is REQUIRED for bundled agent (indirect deps like ws, p-retry)"

  vite_white_screen_after_cargo_build:
    symptom: "App launches but shows white/blank screen"
    cause: "Used cargo build --release instead of npx tauri build --no-bundle"
    fix: "ALWAYS use npx tauri build --no-bundle (WebKitGTK asset protocol)"

  windows_gateway_mode_not_set:
    symptom: "Gateway start blocked: set gateway.mode=local (current: unset)"
    cause: "OpenClaw provisioning did not set gateway.mode=local in /root/.openclaw/openclaw.json"
    fix: "Added Step 5 to provision_distro() in wsl.rs — sets gateway.mode=local via node script"
    incident: "2026-03-11 — Gateway refused to start after fresh WSL provisioning"

  windows_restart_gateway_race:
    symptom: "Gateway connection fails after Naia login — Gateway killed mid-spawn"
    cause: "Deep link auth triggers multiple restartGateway calls without re-entrancy guard"
    fix: "compare_exchange atomic guard on restarting_gateway AtomicBool (SeqCst). Guard released AFTER agent restart completes."
    incident: "2026-03-11 — login deep link fired 3 times, concurrent restarts killed Gateway"

  windows_git_bash_path_conversion:
    symptom: "MSYS translates /opt/naia/... to C:/Program Files/Git/opt/naia/..."
    cause: "Git bash auto-converts Unix-style paths to Windows paths"
    fix: "Prefix commands with MSYS_NO_PATHCONV=1"

  windows_pnpm_non_tty:
    symptom: "ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY when running pnpm install in WSL"
    cause: "pnpm prompts for confirmation when replacing node_modules, but no TTY available"
    fix: "CI=true pnpm install"

  windows_wslconfig_localhost_forwarding:
    symptom: "Warning: localhostForwarding is not applicable with networkingMode=mirrored"
    cause: "Deprecated option in .wslconfig template"
    fix: "Removed localhostForwarding=true from config/defaults/wslconfig-template"
    incident: "2026-03-11"

npm_packages:
  description: |
    Two public npm packages aggregate the naia-agent ecosystem.
    naia-os ships both as vendor tarballs (offline-first).
    npm registry is used for future online updates only.
  packages:
    "@nextain/naia-memory":
      version: 0.1.4
      vendor_tarball: agent/vendor/nextain-naia-memory-0.1.4.tgz
      publish_status: pending_otp  # npm 2FA OTP required
      publish_cmd: "cd projects/naia-memory && npm publish --otp=<6digit>"
    "@nextain/naia-agent":
      version: 0.1.0
      vendor_tarball: not_in_naia-os  # naia-agent repo only
      publish_status: pending_otp  # npm 2FA OTP required
      publish_cmd: "cd projects/naia-agent/packages/naia-agent && npm publish --access public --otp=<6digit>"
  vendor_pattern:
    location: agent/vendor/
    tarballs:
      - nextain-agent-protocol-0.1.0.tgz
      - nextain-agent-providers-0.1.0.tgz
      - nextain-agent-types-0.1.0.tgz
      - naia-adk-skill-spec-0.1.0.tgz
      - naia-adk-skills-builtin-0.0.1.tgz
      - nextain-naia-memory-0.1.4.tgz  # added 2026-05-16 (issue #292)
  why_vendor_not_npm:
    - offline-first for on-premises deployments
    - Flatpak sandbox pnpm install still needs --share=network for public npm deps
    - npm update support will be added as Phase B
  pnpm_overrides:
    agent_package_json: |
      "pnpm": { "overrides": { "@naia-adk/skill-spec": "file:./vendor/naia-adk-skill-spec-0.1.0.tgz" } }

flathub_submission:
  guide: docs/flathub-submission-guide.md
  status: not_started
  blockers:
    - cargo-sources.json not generated
    - node-sources-agent.json not generated (requires Linux + flatpak-node-generator Python tool)
    - node-sources-shell.json not generated
  steps:
    1: Generate offline dependency JSONs (flatpak-builder-tools)
    2: Finalize flathub manifest (remove --share=network, add commit SHA)
    3: Fork flathub/flathub on GitHub
    4: Create PR with manifest + dependency files
    5: Address reviewer feedback

os_image:
  builder: blue-build/github-action@v1
  base: ghcr.io/ublue-os/bazzite (Fedora Atomic)
  recipe: recipes/recipe.yml
  scripts:
    - config/scripts/install-naia-shell.sh (downloads Flatpak bundle from GitHub Release + creates first-boot service)
    - config/scripts/branding.sh (os-release → Naia, URLs → naia.nextain.io)
  deployed_files:
    - config/files/usr/etc/xdg/autostart/naia-shell.desktop (login autostart → flatpak run)
  iso_hook:
    - installer/hook-post-rootfs.sh (installs Flatpak + GNOME Platform 50 for live session)
  registry: ghcr.io/nextain/naia-os
  tags: [latest, YYYYMMDD, fedora-version, YYYYMMDD-fedora-version]
  status: working
  notes:
    - Recipe name must be lowercase (Docker stage name constraint)
    - Checkout needs submodules:true for shared-modules
    - GHCR package visibility must be public (org setting)
    - Naia Shell autostart on login via XDG autostart entry

bootable_usb:
  create: "sudo dd if=naia-os-live-amd64.iso of=/dev/sdX bs=4M status=progress oflag=sync"
  verify: "lsblk /dev/sdX -o NAME,SIZE,LABEL,FSTYPE (label should be titanoboa_boot)"
  behavior:
    - Live session = read-only squashfs + RAM overlay (ephemeral)
    - Pre-installed apps (Chrome, Discord, Firefox, Naia Shell) persist across boots
    - User data, settings, AI conversations are lost on reboot
    - "Install to Hard Drive" for permanent installation
  notes:
    - Must unmount USB first (sudo umount /dev/sdX1)
    - ISO is hybrid — works for both UEFI and legacy BIOS boot
    - CDLABEL is titanoboa_boot (hardcoded by titanoboa)
