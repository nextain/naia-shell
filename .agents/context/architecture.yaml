description: Naia architecture (mirror of .users/context/ko/architecture.md)

# ═══════════════════════════════════════════════════════════════════════════
# CURRENT STATUS (post-#201, validated by #272 / #273 / #274 / #275)
# ═══════════════════════════════════════════════════════════════════════════
#
# Naia OS today is an EMBEDDED-AGENT architecture, NOT a hybrid daemon stack.
# Source-of-truth for the present wire is `.agents/context/agent-bridges.yaml`.
#
# Pillars today:
#   - naia-os shell (Tauri 2 + React + Three.js avatar) — UI host, device IO
#   - naia-agent (embedded, stdio JSON; was a separate daemon pre-#201)
#       - 3 bridges: protocol / memory / approval (#272)
#       - 23-skill catalog imported from @naia-adk/skills-builtin (#273 + #274)
#       - 5 strangler-fig LLM provider adapters (env-flag gated)
#   - naia-memory R4 — vector + LLM fact extractor + contradiction filter
#   - naia-adk — workspace + skill SoT (skill-spec + skills-builtin + openclaw-compat)
#
# OpenClaw was the gateway daemon before #201; it is GONE from runtime. The
# remaining OpenClaw-shaped content in this file is preserved as HISTORICAL
# context (see `history.legacy_three_pillars` block below) so the rationale
# for what we have today is traceable. Do not treat it as current design.

recent_changes:
  date: "2026-05-21"
  summary: |
    naia-adk scaffold distribution (git clone on new setup), user data migration
    ~/.naia/ → naia-settings/, local session persistence, memory AI provider config
    in OnboardingWizard, root naia-settings/ duplicate removed.
  changes:
    - "clone_naia_adk / delete_naia_adk Tauri commands — git clone --depth 1 nextain/naia-adk; zip fallback (reqwest+zip) when git absent; CREATE_NO_WINDOW on Windows"
    - "AdkSetupScreen: cloning flow + cloning state + i18n for new-start and delete-reinstall modes"
    - "remove root naia-settings/ (duplicate of shell/public/assets/, now authoritative)"
    - "migrate-user-data.ts: one-shot additive migration ~/.naia/{sessions,memory,identity} → naia-settings/.{sessions,memory,identity}"
    - "local-sessions.ts: local session persistence in naia-settings/.sessions/"
    - "OnboardingWizard: memoryEmbeddingProvider + memoryLlmProvider config (none/offline/vllm/ollama/naia)"
    - "remove bundled naia-settings assets (vrm-files/bgm-musics/background) — served from naia-adk clone; copy_bundled_assets now scope-extension only"

recent_hardening:
  date: "2026-05-12"
  summary: |
    Adversarial-review batch closed 5 P0-critical security issues + 1 P0
    UX + 1 P1 gateway routing bug. All changes documented in
    `agent-bridges.yaml > security_hardening` section.
  closed_issues:
    - "#256 — handleToolRequest tier bypass gated (4 tests)"
    - "#257 — panel_install rejects file:// / http:// / git@ / bare path (8 tests)"
    - "#258 — assetProtocol.scope removes bare ** + drive roots + adds requireLiteralLeadingDot (7 tests)"
    - "#259 — discord.com removed from CSP connect-src (3 tests)"
    - "2026-05-21 — CSP img-src += i.ytimg.com/*.ytimg.com (BGM thumbnails); frame-src += youtube.com/youtube-nocookie.com (BGM player)"
    - "#260 — webhook URLs off per-request stdio via new notify_config msg (8 tests)"
    - "#248 — Naia gateway lacks gemini-3.x access; drop from picker + migrate saved configs + accurate 0-byte SSE error (8 tests)"
    - "#254 — startup white flash backgroundColor + useAppReady onboarding short-circuit (4 tests)"
  follow_ups_done:
    - "#277 — runtime asset_protocol_scope.allow_directory() at copy_bundled_assets, plus protocol-asset Cargo feature + assetProtocol.enable:true"
    - "creds_update LLM keys — provider.apiKey moved to one-shot push"
    - "creds_update ttsKeys + gatewayToken — same message extended; SendChatOptions + directToolCall opts no longer accept the legacy fields (compile-time block); all shell callsites cleaned"
  follow_ups_open:
    - "Drop ProviderConfig.apiKey from agent types entirely (currently @deprecated optional)"

current_runtime:
  source_of_truth: .agents/context/agent-bridges.yaml
  diagram: |
    ┌─────────────────────────────────────────────────────────┐
    │  Naia Shell (Tauri 2 + React + Three.js VRM Avatar)     │
    │  Role: UI, avatar, panels, device IO, channel adapters  │
    └────────────────────┬────────────────────────────────────┘
                         │ stdio JSON lines
                         │  + StdioFrame v1 envelope (transitioning, #272)
    ┌────────────────────▼────────────────────────────────────┐
    │  naia-agent (embedded child process)                    │
    │  - protocol-bridge: envelope codec                      │
    │  - memory-bridge:   MemorySystem→MemoryProvider adapter │
    │  - approval-bridge: IPC approval broker (Phase 5 wire)  │
    │  - factory.ts:      _agentNaiaKey + 5 strangler-fig     │
    │  - 23 built-in skills (descriptors from naia-adk)       │
    └────────────────────┬────────────────────────────────────┘
                         │ MemoryProvider contract
    ┌────────────────────▼────────────────────────────────────┐
    │  naia-memory R4                                         │
    │  LocalAdapter + embedding providers + fact extractor +  │
    │  HeuristicContradictionFilter                           │
    └─────────────────────────────────────────────────────────┘

# ═══════════════════════════════════════════════════════════════════════════
# HISTORICAL (legacy framing, pre-#201) — kept for context, not current design
# ═══════════════════════════════════════════════════════════════════════════

history:
  legacy_three_pillars_framing: |
    Naia was originally framed as a hybrid assembly of 3 ecosystems:
    OpenClaw (Gateway daemon + exec + channels + skills), project-careti
    (LLM/tools/persona), OpenCode (client/server pattern). The hybrid was
    a clear win at the time because each ecosystem had gaps the others
    filled — Careti lacked daemon, OpenClaw lacked desktop UX, OpenCode
    lacked channels — and assembling them was cheaper than building from
    scratch.

  why_we_moved_off_openclaw:
    - "OpenClaw gateway added a 2nd process + a separate config + a separate skill registry; naia-agent already had all of that, just in TS"
    - "WebSocket handshake + token auth + reload mechanics were dead weight for a same-machine embed"
    - "Skill 정합 was DUAL (TS skills in naia-agent + Lua/JSON in openclaw)"
    - "Removed in #201 (chore(shell): remove openclaw gateway spawn)"
    - "Reconciled in #272 (bridges + adapters) + #273 (skill catalog) + #274 (OpenClaw skill ports as native naia skills) + #271 Phase 1 (Flatpak bundling removed)"

three_pillars:
  status: HISTORICAL
  note: |
    The three-pillar framing below is the pre-#201 design rationale.
    Today's runtime collapses pillar_1_openclaw into pillar_2_careti
    (the embedded naia-agent). Read `current_runtime` above + the
    SoT `agent-bridges.yaml` for present state.
  pillar_1_openclaw:
    role: "Runtime backend (daemon + execution environment)"
    provides:
      - "Gateway WebSocket server (systemd, always-on)"
      - "Command/file RPCs (exec.bash, node.invoke/system.run)"
      - "Security: device auth, token scopes, exec approvals"
      - "Channels: Discord, Telegram, WhatsApp, Slack, IRC, etc."
      - "Skills: 50+ built-in (weather, time, memo, etc.)"
      - "Memory: conversation persistence, context recall"
      - "Sessions: multi-session management, sub-agent spawn"
      - "ACP (Agent Control Protocol): client↔agent bridge"
      - "TTS: unified provider selector (Edge TTS free, Google Cloud, OpenAI, ElevenLabs) with direct API calls"
    connection_protocol:
      handshake: "connect.challenge → connect (protocol v3)"
      auth: "device identity + token scopes (Ed25519 signed nonce)"
      client_id: "cli (paired device identifier)"
      methods: "88 methods (agent, sessions.*, exec.*, skills.*, channels.*, etc.)"
    what_naia_uses:
      - "Gateway daemon as systemd user service"
      - "Command execution via exec.bash (preferred) or node.invoke fallback"
      - "exec.approvals for permission system"
      - "sessions.* for session management (when exposed by gateway config)"
      - "skills.invoke and/or browser.request for web/browser actions"
      - "channels.* for Discord/Telegram"
      - "agent method for agent interaction"

  pillar_2_careti:
    role: "Agent intelligence (LLM + tools + persona)"
    provides:
      - "Multi-provider LLM via registry: Naia, Claude Code CLI, Gemini, OpenAI, Anthropic, xAI, Zhipu, Ollama"
      - "Tool definitions: GATEWAY_TOOLS (8 tools)"
      - "Function calling: Gemini native (xAI/Claude = tech debt)"
      - "Alpha persona: system prompt, emotion mapping"
      - "Cost tracking: per-request cost display"
      - "stdio JSON lines protocol: Shell ↔ Agent"
    what_naia_uses:
      - "LLM provider registry (shell/src/lib/llm/ + agent/src/providers/registry.ts)"
      - "Tool loop (max 10 iterations, abort support)"
      - "Permission tiers 0-3"
      - "stdio protocol (chat_request/text/tool_use/tool_result/etc.)"

  pillar_3_opencode:
    role: "Architecture pattern (client/server separation)"
    provides:
      - "Clean client/server separation"
      - "Provider abstraction layer"
      - "LSP-style communication pattern"
    what_naia_uses:
      - "Shell (client) / Agent (server) separation via stdio"
      - "Provider registry pattern (registerLlmProvider → buildProvider)"
      - "Clean module boundaries (shell/agent/gateway)"

runtime_architecture:
  diagram: |
    ┌─────────────────────────────────────────────────────────┐
    │  Naia Shell (Tauri 2 + React + Three.js VRM Avatar) │
    │  Role: Desktop UI, avatar rendering, chat panel        │
    │  Source: Naia + AIRI (VRM) + shadcn/ui              │
    └──────────────────────┬──────────────────────────────────┘
                           │ stdio JSON lines
    ┌──────────────────────▼──────────────────────────────────┐
    │  Naia Agent (Node.js)                                │
    │  Role: LLM connection, tool orchestration, Alpha persona│
    │  Source: Careti providers + OpenCode pattern             │
    │  Features: multi-LLM, TTS, emotion, cost tracking       │
    └──────────────────────┬──────────────────────────────────┘
                           │ WebSocket (ws://127.0.0.1:18789)
    ┌──────────────────────▼──────────────────────────────────┐
    │  Naia Gateway (systemd user service)                │
    │  Role: Execution, security, channels, skills, memory    │
    │  Source: naia-agent (Node.js, pnpm dev / dist/index.js)  │
    │  Auth: device identity + token scopes (protocol v3)     │
    │  Methods: dynamic by profile (agent, node.invoke,        │
    │  sessions.*, browser.request, skills.*, channels.* ...)  │
    └─────────────────────────────────────────────────────────┘

  shell_ui_layout:
    description: "Shell component hierarchy and layout"
    structure: |
      App
      ├── TitleBar (panel toggle button + window controls)
      └── .app-layout [data-panel-position="left"|"right"|"bottom"]
          ├── .side-panel (ChatPanel — only when panelVisible=true)
          └── .main-area (AvatarCanvas — always visible)
    panelPosition: "'left' | 'right' | 'bottom' — controls CSS flex-direction on .app-layout"
    panelVisible: "boolean — toggles .side-panel presence; avatar always stays"
    panelSize: "number (0-100) — chat panel percentage of viewport. Default: 70"
    avatar_sizing: "ResizeObserver on container (not window resize)"
    config_sync: "panelPosition + panelVisible + panelSize + liveVoice + liveModel + voiceConversation synced to Lab via LAB_SYNC_FIELDS"

  data_flow:
    chat: "User → Shell → Agent → LLM → Agent → Shell → User"
    tool_exec: "LLM → Agent (tool_use) → Gateway (exec.bash or node.invoke) → OS → result → LLM"
    approval: "Gateway → Agent (approval_request) → Shell (modal) → user decision → Agent → Gateway"
    external: "Discord msg → Gateway → Agent → LLM → Agent → Gateway → Discord reply"

credential_storage:
  description: "naiaKey dual-storage architecture (localStorage + Tauri secure store)"
  updated: "2026-03-05"
  overview: |
    naiaKey (Naia Lab API key) is stored in two locations for reliability:
    1. localStorage — sync, fast, used by all UI components via saveConfig/loadConfig
    2. Tauri secure store (plugin-store) — async, encrypted, persists across browser storage clears
  write_points:
    login: "SettingsTab/OnboardingWizard: saveConfig({naiaKey}) + saveSecretKey('naiaKey', key)"
    save: "SettingsTab handleSave: saveConfig() + void saveSecretKey()"
    logout: "SettingsTab: saveConfig({naiaKey: undefined}) + deleteSecretKey('naiaKey')"
  read_merge: |
    loadConfigWithSecrets() merges both sources with localStorage priority:
    1. Read localStorage value (sync)
    2. Read secure store value (async)
    3. If localStorage has value → use it; sync to secure store if different
    4. If only secure store has value → use it (migration/recovery case)
    This prevents stale secure store values from overriding fresh login tokens.
  naiaKey_independence: |
    naiaKey is passed as a top-level field in ChatRequest, separate from provider config.
    This allows Naia Cloud TTS to work regardless of which LLM provider is selected.
    - ChatPanel sends naiaKey in both provider.naiaKey (for LLM) and request-level naiaKey (for TTS)
    - Agent uses effectiveNaiaKey = request.naiaKey || provider.naiaKey for TTS auth
  files:
    - "shell/src/lib/config.ts — loadConfigWithSecrets(), saveConfig()"
    - "shell/src/lib/secure-store.ts — saveSecretKey(), getSecretKey(), deleteSecretKey()"
    - "shell/src/components/SettingsTab.tsx — login/logout/save handlers"
    - "shell/src/components/OnboardingWizard.tsx — lab auth handler"
    - "agent/src/index.ts — effectiveNaiaKey resolution"
    - "agent/src/protocol.ts — ChatRequest.naiaKey field"

desktop_avatar_asset_pipeline:
  purpose: "Stable local-file loading for VRM model/background in Tauri WebView"
  rules:
    - "Normalize file:// paths to absolute filesystem paths before storage/rendering."
    - "If URL appears as http://localhost/... convert to http://asset.localhost/... for Tauri asset protocol compatibility."
    - "For absolute local VRM, read bytes via Rust command read_local_binary and parse as ArrayBuffer in frontend to avoid CORS/fetch failures."
    - "Background images may use asset URL conversion; fallback to gradient if loading fails."
  e2e_note:
    - "e2e-tauri uses prebuilt binary src-tauri/target/debug/naia-shell (not pnpm build output)."
    - "When Rust command/invoke_handler changes, run cargo build in src-tauri before wdio e2e."
  agent_build_note: |
    Agent runs from shell/src-tauri/target/debug/agent/dist/index.js (pre-built).
    Vite HMR does NOT apply to agent code. After modifying agent/src/:
    1. cd agent && pnpm build (tsc compiles to agent/dist/)
    2. cp -r agent/dist/ shell/src-tauri/target/debug/agent/dist/
    Or restart `pnpm run tauri dev` which rebuilds automatically.

channel_onboarding_routing:
  description: "Discord bot add flow is routed through naia.nextain.io instead of direct webhook input"
  routes:
    - "Shell ChannelsTab login(discord) -> https://naia.nextain.io/ko/discord/connect?source=naia-shell"
    - "Onboarding complete optional action -> same route"
  security:
    - "Do not expose/use DISCORD_BOT_TOKEN in shell frontend"
    - "Bot secrets stay server-side in naia.nextain.io env"

deep_link_persistence_contract:
  description: "OAuth deep-link payload must be persisted even when specific UI tabs are not mounted"
  requirements:
    - "Deep-link events that affect runtime behavior (e.g., discord_auth_complete) must be handled by an always-mounted layer (App root or equivalent)."
    - "Settings/Onboarding listeners may update local UI state, but persistence logic must be centralized in shared lib code."
    - "Agent send default-target behavior must not depend on whether Settings tab was open during OAuth callback."
  anti_patterns:
    - "Persisting critical auth payload only inside feature tabs/components that can be unmounted."
    - "Duplicating persistence rules across multiple components with divergent fallback behavior."

memory_architecture:
  description: "Three-layer memory: Shell (user facts) + Naia Gateway (session transcripts) + Agent naia-memory (semantic search + contradiction filter)"

  overview: |
    Memory lives in THREE systems that serve different purposes and connect at session boundaries.
    Shell owns "who is the user" (facts). Naia Gateway owns "what happened" (session transcripts).
    Agent owns "semantic recall + contradiction filtering" via @nextain/naia-memory (R3).
    All three are required for full memory.

  shell_memory:
    description: "User-facing facts and session summaries, owned by Tauri Shell"
    short_term:
      name: "Short-Term Memory (STM)"
      storage: "Zustand (in-memory) + SQLite messages table"
      scope: "Current session full messages"
      lifetime: "Current session ~ recent 7 days"
      implementation:
        rust: "memory.rs (facts table, Arc<Mutex<Connection>>)"
        frontend: "db.ts (invoke wrappers) + chat store (sessionId, loadSession)"
    long_term:
      name: "Long-Term Memory (LTM) — Facts"
      storage: "SQLite facts table (~/.config/naia-os/memory.db)"
      scope: "Cross-session user knowledge (name, birthday, preferences, decisions)"
      implementation:
        extraction: "memory-processor.ts extractFacts() — LLM parses conversation → {key, value}[]"
        storage: "db.ts upsertFact() → Rust memory.rs (ON CONFLICT(key) UPDATE)"
        injection: "persona.ts buildSystemPrompt() → 'Known facts about the user: ...' in system prompt"

  gateway_memory:
    description: "Session transcripts + semantic search, owned by Naia Gateway daemon"
    session_store:
      name: "Session Transcripts"
      storage: "~/.naia/sessions/ (sessions.json + *.jsonl per session)"
      scope: "Full conversation history per session key (e.g. agent:main:main, discord:dm:*)"
      features:
        - "sessions.list / chat.history / sessions.transcript RPC"
        - "sessions.compact — removes old messages within a session"
        - "session-memory hook — on /new or /reset, saves conversation to workspace/memory/*.md"
    semantic_search:
      name: "Semantic Memory Index"
      storage: "~/.naia/memory/main.sqlite (SQLite with embeddings)"
      tools:
        - "memory_search — semantic search across sessions and workspace memory files"
        - "memory_get — retrieve specific memory entry"
      scope: "Cross-session searchable index (sessions + workspace/memory/*.md files)"
    workspace:
      name: "Workspace Bootstrap Files"
      storage: "~/.naia/workspace/ (SOUL.md, IDENTITY.md, USER.md)"
      sync: "Shell writes these via sync_gateway_config (lib.rs) on settings change"
      note: "Regenerable from Shell settings — not primary data"

  data_flow: |
    === Session lifecycle (how the two systems connect) ===

    1. SESSION START
       Shell: buildMemoryContext() → getAllFacts() from Shell DB
       Shell: buildSystemPrompt(persona, {facts, userName, locale, ...})
       → System prompt sent to Agent with user facts injected

    2. DURING SESSION
       Agent ↔ Naia Gateway: messages stored in session transcript (*.jsonl)
       Naia Gateway: memory_search tool available for LLM to query past sessions
       Shell: Zustand store holds current messages for UI

    3. SESSION END (user clicks "New Conversation")
       Shell: summarizePreviousSession() [fire-and-forget]
         a. summarizeSession(messages) → LLM generates 2-3 sentence summary
         b. patchGatewaySession("agent:main:main", {summary}) → saved to Naia Gateway session metadata
         c. extractFacts(messages, summary) → LLM extracts {key, value}[] user facts
         d. upsertFact() × N → saved to Shell facts DB (memory.db)
       Naia Gateway: session-memory hook saves conversation to workspace/memory/YYYY-MM-DD-slug.md
       Naia Gateway: semantic index updated with new session content

    4. NEXT SESSION
       Shell: loads facts from Shell DB → injects into system prompt
       Naia Gateway: memory_search can find content from previous sessions
       → User is "remembered" through both system prompt facts AND searchable history

  discord_channel_memory: |
    Discord messages flow through Naia Gateway sessions (key: agent:main:discord:direct:<userId>
    or agent:main:discord:channel:<channelId>). These are stored in Naia Gateway session transcripts
    and indexed by memory_search. However, Shell fact extraction (summarizePreviousSession) only
    runs on Shell chat sessions — Discord conversations do NOT trigger fact extraction yet.

  backup_required:
    must_backup:
      - "~/.config/naia-os/memory.db — Shell facts (user knowledge, not regenerable)"
      - "~/.naia/memory/main.sqlite — semantic search index (rebuildable but slow)"
      - "~/.naia/sessions/ — conversation transcripts"
      - "~/.naia/gateway.json — gateway config (API keys, model settings)"
    regenerable:
      - "~/.naia/workspace/ (SOUL.md, IDENTITY.md, USER.md) — re-synced from Shell settings"
      - "~/.naia/credentials/ — re-authenticatable"

  agent_memory:
    description: "Semantic memory system in the agent process — @nextain/naia-memory R3"
    added: "2026-05-07 (#226)"
    package: "@nextain/naia-memory (file:../../naia-memory — local submodule)"
    config_file: "~/.naia/memory-config.json"
    config_fields:
      embeddingProvider: "vllm | ollama | naia (optional)"
      embeddingBaseUrl: "base URL for vllm/ollama embedding endpoint"
      embeddingApiKey: "API key (vllm/ollama; optional)"
      embeddingModel: "model name (e.g. nomic-embed-text)"
      llmProvider: "naia (for LLM fact extractor)"
    builds_via: "buildMemorySystem() in agent/src/index.ts — reads memory-config.json"
    adapter: "LocalAdapter — storePath: ~/.naia/memory/agent-store.json"
    embedding_providers:
      vllm_ollama: "OpenAICompatEmbeddingProvider(baseUrl, key, model)"
      naia: "NaiaGatewayEmbeddingProvider(naiaKey)"
      none: "LocalAdapter keyword-only (default when no config)"
    r3_features:
      contradiction_filter: "HeuristicContradictionFilter (subpath: contradiction-filter.js, not top-level index)"
      reconsolidation: "auto-runs on encode() — O(topK) vector search, no full scan"
      hyde: "Hypothetical Document Embeddings for recall quality"
      mmr: "Maximal Marginal Relevance for diverse results"
    api:
      encode: "ms.encode(input: MemoryInput, context: EncodingContext): Promise<Episode>"
      recall: "ms.recall(query: string, context: RecallContext): Promise<{episodes, facts, reflections}>"
      sessionRecall: "ms.sessionRecall(firstMessage, context, tokenBudget?): Promise<string>"
      close: "ms.close(): Promise<void>"
    shell_settings_ui: "SettingsTab.tsx — Memory section: embedding provider, base URL, model, LLM provider"

  search_evolution:
    phase_4_4a: "SQLite LIKE (keyword matching)"
    phase_4_4b: "SQLite FTS5 BM25 (full-text search)"
    phase_4_5: "Gemini Embedding API (semantic search)"
    phase_5_plus: "Agent @nextain/naia-memory R3 — vLLM/Ollama local embedding + HeuristicContradictionFilter"
  interface: |
    MemoryProcessor {
      summarize(messages): Promise<string>
      extractFacts?(messages): Promise<Fact[]>
      semanticSearch?(query, limit): Promise<MessageRow[]>
    }
  db_schema:
    shell_facts: "id TEXT PK, key TEXT UNIQUE, value TEXT, source_session TEXT, created_at INT, updated_at INT"
    naia_sessions: "~/.naia/sessions/sessions.json (metadata) + *.jsonl (transcripts)"
    naia_memory: "~/.naia/memory/main.sqlite (semantic index with embeddings)"

skill_system:
  description: "Skill management: built-in skills, Gateway skills, and install flow"
  updated: "2026-03-05"

  built_in_skills:
    count: 20
    sync_locations:
      - "shell/src-tauri/src/lib.rs — list_skills Tauri command"
      - "shell/src/components/ChatPanel.tsx — BUILTIN_SKILLS Set (guards against disable)"
      - "agent/src/skills/built-in/*.ts — tool-bridge registry"
      - "agent/scripts/generate-skill-manifests.ts — SKIP_BUILT_IN list"
    rule: "All 4 locations must list the same 20 skills. Adding a new built-in requires updating all 4."

  gateway_skills:
    source: "Naia Gateway skills.status RPC"
    response_fields:
      - "name, description, eligible, missing[]"
      - "install[]: { id, kind, label } — available installer specs per skill"
    install_kinds: "brew, node, go, uv, download"

  install_flow:
    description: "Shell → Agent → Gateway RPC for skill dependency installation"
    diagram: |
      1. Shell SkillsTab calls fetchGatewayStatus()
         → directToolCall({ action: "gateway_status" })
         → Agent skill_skill_manager → Gateway skills.status RPC
         → Returns skills[] with install[] arrays

      2. User clicks Install button
         → Shell resolves installId from gs.install[0].id
         → directToolCall({ action: "install", skillName, installId })
         → Agent skill_skill_manager → Gateway skills.install RPC
         → Gateway runs installer (brew/npm/go/etc)
         → Returns success/error

      3. Shell shows install result feedback (.skill-install-result.success/.error)
         → Re-fetches gateway status to update UI
    rpc_params:
      skills_status: "{ agentId? }"
      skills_install: "{ name, installId } — installId is REQUIRED (from install[].id)"
    note: "installId comes from skills.status response. Without it, Gateway rejects with validation error."

  directToolCall_flow: |
    Shell directToolCall() → Tauri stdin → Agent handleToolRequest()
    → executeTool(skill_skill_manager, args) → installSkill(gateway, name, installId)
    → Gateway skills.install RPC → result back to Shell

  event_cleanup: |
    GatewayAdapter.offEvent(handler) must be called after delegateStreaming completes
    to prevent event handler memory leaks. Added in 2026-03-05 fix.

panel_system:
  description: "Extensible panel system — installable UI components exposed as ModeBar tabs"
  added: "2026-03-20 (#89)"
  overview: |
    Panels are React components installed under ~/.naia/panels/{id}/.
    Each panel appears as a tab in the ModeBar (right side of the shell).
    Built-in panels are registered at shell build time; installed panels are
    scanned at startup and after each install/remove via panel_list_installed.

  directory_layout:
    installed: "~/.naia/panels/{id}/ — one directory per panel"
    manifest: "~/.naia/panels/{id}/panel.json — required manifest"
    note: "panel.json (NOT app.json or manifest.json) — terminology MUST stay consistent"

  manifest_fields:
    id: "required — kebab-case unique identifier"
    name: "required — display name"
    names: "optional — i18n map { ko, en, ... }"
    description: "optional — shown in future panstore"
    icon: "optional — emoji or single char for ModeBar tab"
    iconUrl: "optional — relative path to SVG file (e.g. 'icon.svg')"
    iconSvg: "runtime-only — Rust reads iconUrl and populates this inline; NOT stored in panel.json"
    version: "optional — semver string"

  install_flow:
    description: "PanelInstallDialog → Shell → Agent panel_install handler → disk install → result + reload"
    diagram: |
      1. User clicks '+' in ModeBar → PanelInstallDialog opens
         → chooses Git URL or Zip file path
         → clicks '추가' → sendPanelInstall(source) in chat-service.ts
         → Shell sends { type: "panel_install", source } to Agent via Tauri stdin

      2. Agent panel_install handler (index.ts)
         → calls actionInstall(source, { writeLine: () => undefined }) — suppress inner panel_control
         → on result: emit panel_install_result FIRST, then panel_control reload (if success)
         CRITICAL: result MUST come before reload — dialog uses successRef to gate auto-close

      3. PanelInstallDialog receives panel_install_result via direct listen("agent-response-chunk")
         (bypass requestId filter — panel_install_result has no requestId)
         → shows success/error message, sets successRef.current = true on success

      4. PanelInstallDialog receives panel_control reload
         → if successRef.current: loadInstalledPanels() then onClose()
         → ModeBar re-renders via panelListVersion bump

  agent_install_logic:
    file: "agent/src/skills/built-in/panel.ts"
    function: "actionInstall(source, ctx)"
    git_detection: "/^https?:\/\/|^git@|^file:\/\// — covers https://, http://, git@, file://"
    zip_handling: |
      unzip -o source -d destDir
      If zip has single root dir → move contents up to destDir (flatten)
    name_derivation: "deriveNameFromSource strips .git and .zip suffixes, takes last path segment"
    manifest_check: "readManifest(destDir) after install — if panel.json absent, removes destDir and returns error"
    panels_dir: "~/.naia/panels/ (PANELS_DIR constant)"

  tauri_commands:
    panel_list_installed:
      file: "shell/src-tauri/src/panel.rs"
      returns: "Vec<PanelManifest> — scans ~/.naia/panels/, loads panel.json, reads iconSvg from iconUrl"
    panel_read_file:
      file: "shell/src-tauri/src/panel.rs"
      params: "path: String"
      security: "canonicalize() to resolve symlinks + HOME boundary check + 1 MB size limit"
    panel_run_shell:
      file: "shell/src-tauri/src/panel.rs"
      params: "cmd: String, args: Vec<String>"
      security: "SHELL_CMD_MAP allowlist (absolute paths, no PATH lookup) + arg metachar/separator/traversal filter + cwd=HOME"
      allowed_cmds: "ls, echo, pwd, date, uname, whoami (all absolute /usr/bin/ paths)"
    panel_remove_installed:
      file: "shell/src-tauri/src/panel.rs"
      params: "panelId: String"
      validates: "no '/', '\\', '..' in panelId (path traversal guard)"
      security: "canonicalize() after exists() + HOME boundary check before remove_dir_all (symlink attack prevention)"
      removes: "~/.naia/panels/{panelId}/ directory"

  shell_files:
    registry: "shell/src/lib/panel-registry.ts — PanelDescriptor (id, name, icon, iconSvg, builtIn, source, center, tools)"
    loader: "shell/src/lib/panel-loader.ts — loadInstalledPanels(), removeInstalledPanel()"
    dialog: "shell/src/components/PanelInstallDialog.tsx — two-tab UI (Git URL / Zip file)"
    modebar: "shell/src/components/ModeBar.tsx — scrollable .mode-bar-tabs + SVG icon support"
    store: "shell/src/stores/panel.ts — panelListVersion (bump triggers ModeBar re-render)"

  critical_gotchas:
    terminology: "ALL code uses 'panel' — panel.json, ~/.naia/panels/, PanelDescriptor. Never 'app' or 'manifest'."
    result_before_reload: |
      Agent MUST emit panel_install_result before panel_control reload.
      PanelInstallDialog sets successRef on result; on reload, checks successRef before closing.
      If reload arrives first, successRef is false → dialog stays open forever.
    direct_listen: |
      PanelInstallDialog uses listen("agent-response-chunk") directly, NOT chat-service requestId filter.
      panel_install_result has no requestId field — the filter would block it.
    zip_extension: "deriveNameFromSource MUST strip .zip — otherwise panel dir is named 'foo.zip' not 'foo'."
    file_url_as_git: "file:// URLs are treated as git (clone), not zip. Useful for local git repos."

  iframe_bridge:
    description: "postMessage server/client for iframe-based installed panels — added 2026-03-23 (#98)"
    files:
      server: "shell/src/lib/iframe-bridge.ts — Shell-side message listener (startIframeBridge)"
      client: "shell/src/lib/naia-bridge-client.ts — panel-side wrapper (NaiaBridgeClient class)"
      behavior_log: "shell/src/lib/behavior-log.ts — IndexedDB naia_behavior, 30-day purge"
    bridge_messages:
      logBehavior: "panel → Shell IndexedDB (panelId-scoped)"
      queryBehavior: "panel → Shell IndexedDB read (panelId forced by bridge, panel cannot query others)"
      getSecret: "panel → secure-store.ts key=panel:{panelId}:{key}"
      setSecret: "panel → secure-store.ts key=panel:{panelId}:{key}"
      readFile: "panel → Tauri panel_read_file (HOME-restricted, 1 MB limit)"
      runShell: "panel → Tauri panel_run_shell (allowlist)"
    security:
      origin_guard: "event.origin === 'http://asset.localhost' only"
      unknown_block: "panelId === '__unknown__' → all operations denied immediately"
      panel_id_source: "panelIdFromSource() — regex /\\/([^/]+)\\/index\\.html(?:[?#].*)?$/ on iframe.src"
      respond_target: "respond() uses ALLOWED_ORIGIN as targetOrigin (iframe origin)"
      client_send_target: "window.parent.postMessage(req, '*') — '*' needed because window.parent.origin throws SecurityError cross-origin; Shell validates event.origin on receipt"
      namespacing: "getSecret/setSecret keys namespaced panel:{panelId}:{key} — cross-panel isolation"
    naia_context_bridge:
      interface: "NaiaContextBridge in panel-registry.ts — 6 methods added in #98"
      implementations:
        ActivePanelBridge: "full impl via active-bridge.ts getBridgeForPanel(panelId) factory + Map cache"
        NoopContextBridge: "stub for panels without NaiaContextBridge support"
      factory: "getBridgeForPanel(panelId) in active-bridge.ts — returns cached ActivePanelBridge"
      app_integration: "App.tsx startIframeBridge() in useEffect + getBridgeForPanel(panelId) for all panels"

  built_in_panels:
    browser:
      id: "browser"
      added: "2026-03-20 (#95)"
      updated: "2026-05-07 (#249) — migrated from Win32 SetParent to WebView2 child window"
      file: "shell/src/panels/browser/index.tsx + BrowserCenterPanel.tsx"
      description: "WebView2 child window embed (Windows); 12 AI browser tools + skill_tab_screenshot; keepAlive panel (opacity:0 when inactive)"
      embedding:
        linux: "X11 XReparentWindow via x11rb (platform/linux.rs X11WindowManager)"
        windows: |
          Tauri WebView2 child window via browser_webview.rs.
          IPC commands: browser_wv_create, browser_wv_navigate, browser_wv_hide, browser_wv_show, browser_wv_resize (+ full browser control suite: back, forward, reload, click, fill, scroll, press, snapshot, eval, screenshot, get_text, page_info).
          Position/size: LogicalPosition + LogicalSize (DPI-aware, matches viewport div).
          Show/hide: opacity toggle on host div + browser_wv_hide/show IPC (preserves DOM state).
          setPendingApproval: invoke browser_wv_hide BEFORE set({ pendingApproval }) — prevents 1-frame overlap.
        macos: "NOT YET — add PlatformWindowManager impl"
      tools: "skill_browser_navigate, back, forward, reload, click, fill, scroll, press, snapshot, get_text, screenshot, eval (+ skill_tab_screenshot via tab-skills)"
      chrome_profile: "~/.naia/chrome-profile/ — persistent (login sessions survive restarts)"
      chrome_discovery:
        linux: "which google-chrome → flatpak-spawn → flatpak installed"
        windows: "where.exe chrome → Program Files → LOCALAPPDATA"
      requires:
        linux: "GDK_BACKEND=x11 (XWayland mode), google-chrome in PATH or Flatpak"
        windows: "Google Chrome installed (auto-detect + download button in UI)"
      keepalive: "panel keepAlive: true — always mounted, hidden via opacity:0+pointerEvents:none (WebView2 overlay follows)"

    workspace:
      id: "workspace"
      added: "2026-03-23 (#119)"
      file: "shell/src/panels/workspace/index.tsx + WorkspaceCenterPanel.tsx + Terminal.tsx"
      description: "Claude Code session monitor + PTY terminal tabs. Always keepAlive mounted."
      tools:
        - "skill_workspace_get_sessions (tier:0) — all session statuses"
        - "skill_workspace_open_file (tier:1) — open file in editor"
        - "skill_workspace_focus_session (tier:1) — scroll+highlight session card"
        - "skill_workspace_new_session (tier:2) — spawn bash PTY, open terminal tab"
        - "skill_workspace_classify_dirs (tier:0) — classify ~/dev subdirs"
      pty_terminal:
        rust: "shell/src-tauri/src/pty.rs — portable-pty 0.9.0; commands: pty_create, pty_write, pty_resize, pty_kill"
        frontend: "Terminal.tsx — @xterm/xterm + @xterm/addon-fit; keepAlive opacity:0+pointerEvents:none (NOT display:none — FitAddon breaks on hidden elements)"
        events: "pty:output:{pty_id} / pty:exit:{pty_id} (Tauri events from Rust)"
        dedup: "openDirsRef (Set<string>) — add dir BEFORE await pty_create to block concurrent duplicate spawns; delete only on failure or tab close"

  future:
    panstore: "Built-in panel tab showing a curated list of installable panels (separate issue)"
    dynamic_loading: "JS dynamic import for installed panels (planned, not yet implemented)"

security_layers:
  layer_1_os: "Bazzite immutable rootfs + SELinux"
  layer_2_gateway: "Naia Gateway device auth + token scopes + exec approvals"
  layer_3_agent: "Permission tiers 0-3 + tool-level blocking"
  layer_4_shell: "User approval modal + tools on/off toggle"
  principle: "Defense in depth. Every layer is independent."

gateway_adapter_abstraction:
  description: "GatewayAdapter interface decouples agent code from gateway-specific implementation"
  added: "2026-03-17 (#64)"
  interface_file: "agent/src/gateway/types.ts — GatewayAdapter"
  interface_methods:
    - "request(method, params): Promise<unknown>"
    - "onEvent(handler): void"
    - "offEvent(handler): void"
    - "close(): void"
    - "isConnected(): boolean"
    - "availableMethods: string[] (readonly)"
  current_implementation: "GatewayClient implements GatewayAdapter (agent/src/gateway/client.ts)"
  usage: "All proxy files, tool-bridge, skills/types, skills/loader, index.ts use GatewayAdapter — never GatewayClient directly (except new GatewayClient() in connectGatewayWithRetry)"
  future: "#78 — first-run gateway selection + on-demand version-pinned install"
  rationale: "Abstraction layer isolates agent code from gateway protocol changes."

gateway_client_protocol:
  description: "How Naia Agent connects to Naia Gateway"
  steps:
    1_ws_connect: "WebSocket connect to ws://127.0.0.1:18789"
    2_challenge: "Receive connect.challenge event with nonce"
    3_handshake: "Send connect request with auth token, protocol v3, client info"
    4_hello_ok: "Receive hello-ok with available methods and features"
    5_rpc: "Send/receive req/res frames for tool execution"
  auth_params:
    token: "gateway.auth.token from config (shared secret)"
    client_id: "cli (matches paired device clientId)"
    platform: "linux (Windows: Gateway runs inside WSL, so platform is still linux)"
    mode: "cli"
    min_protocol: 3
    max_protocol: 3

  windows_notes:
    description: "On Windows, Gateway runs inside WSL2 NaiaEnv distro"
    connection: "ws://127.0.0.1:18789 (mirrored networking allows localhost access from host)"
    spawn: "wsl.exe -d NaiaEnv -- node /opt/naia/agent/dist/index.js"
    config_requirement: "gateway.mode=local must be set in /root/.naia/gateway.json"
    race_condition_guard: "restart_gateway uses AtomicBool compare_exchange to prevent concurrent restarts"

voice_architecture:
  description: "Voice I/O via two modes: omni LLM (built-in voice) or STT→LLM→TTS pipeline"
  updated: "2026-03-14"

  overview: |
    Voice interaction depends on the LLM model type:
    - Omni models (Gemini Live, OpenAI Realtime): Voice I/O is built into the LLM.
      No separate STT/TTS needed — the model handles speech input and output natively.
    - Standard LLM models: Voice via independent STT → LLM → TTS pipeline.
      STT and TTS are separate, independently selectable providers.
    When an omni model is active, STT/TTS provider settings are disabled.
    STT providers, TTS providers, and LLM providers are three independent categories.

  # ── Omni Models (LLM with built-in voice) ──────────────────────

  omni_models:
    description: "LLM models with built-in bidirectional voice I/O — voice is an LLM capability, not a separate STT/TTS concern"
    provider_pattern:
      type_definition: "LiveProviderId = 'naia' | 'gemini-live' | 'openai-realtime' | 'minicpm-o' | 'vllm-omni' | 'edge-tts'"
      factory: "createVoiceSession(provider: LiveProviderId, options?) → VoiceSession"
      factory_file: "shell/src/lib/voice/index.ts"
      types_file: "shell/src/lib/voice/types.ts"
      config_field: "liveProvider (stored in localStorage config)"
      settings_ui: "SettingsTab.tsx — live provider dropdown + per-provider API key/voice inputs"
    providers:
      naia:
        file: "shell/src/lib/voice/gemini-live.ts"
        route: "Browser WebSocket → any-llm gateway /v1/live → Gemini Live API"
        auth: "naiaKey (X-AnyLLM-Key header)"
        description: "Naia Cloud — uses Lab gateway as proxy to Gemini Live"
      gemini_direct:
        file: "shell/src/lib/voice/gemini-live-proxy.ts"
        route: "Tauri command → Rust WebSocket proxy (tokio-tungstenite) → Gemini Live API"
        rust_module: "shell/src-tauri/src/gemini_live.rs"
        auth: "User's Google API key (passed as URL query param)"
        description: "Direct Gemini Live — bypasses gateway, uses Rust proxy for WebKitGTK WSS limitation"
        key_detail: |
          WebKitGTK cannot connect to wss://generativelanguage.googleapis.com (hangs silently).
          Rust proxy (tokio-tungstenite) handles the WebSocket, relays via Tauri events/commands.
          Google sends JSON as Binary WebSocket frames — msg_to_text() handles both Text and Binary.
      openai_realtime:
        file: "shell/src/lib/voice/openai-realtime.ts"
        route: "Browser WebSocket → wss://api.openai.com/v1/realtime"
        auth: "User's OpenAI API key (via WebSocket subprotocols)"
        voices: "alloy, ash, ballad, coral, echo, sage, shimmer, verse, marin, cedar"
        default_model: "gpt-4o-mini-realtime-preview"
    shared_interface:
      name: "VoiceSession"
      methods: "connect(), sendAudio(base64), sendText(text), sendToolResponse(id, result), disconnect()"
      events: "onAudio, onInputTranscript, onOutputTranscript, onTurnEnd, onInterrupted, onToolCall, onError, onDisconnect"
    voice_setting:
      config_field: "liveVoice"
      stored_value: "short name (e.g., 'Kore', 'Puck')"
      available_voices:
        - "Kore (여성, 차분), Puck (남성, 활발), Charon (남성, 깊은), Aoede (여성, 밝은)"
        - "Fenrir (남성, 낮은), Leda (여성, 부드러운), Orus (남성, 단단한), Zephyr (중성)"
        - "Achernar, Gacrux, Sulafat, Umbriel"
    components:
      shell_chatpanel:
        file: "shell/src/components/ChatPanel.tsx"
        role: "UI state (off/connecting/active), event wiring, transcript accumulation"
        state: "voiceMode: 'off' | 'connecting' | 'active'"
        transcript: "incremental chunks accumulated (inputAccum/outputAccum), reset per turn"
      audio_player:
        file: "shell/src/lib/audio-player.ts"
        role: "Continuous PCM playback (24kHz Int16 mono → AudioContext)"
      mic_stream:
        file: "shell/src/lib/mic-stream.ts"
        role: "Capture mic audio, downsample to 16kHz PCM, emit base64 chunks"
      gateway_live_proxy:
        file: "project-any-llm/src/any_llm/gateway/routes/live.py"
        role: "WebSocket proxy: client ↔ Gemini Live SDK session (used by naia provider)"
    model: "configurable via config.liveModel (per-provider defaults exist)"

  # ── LLM Providers (registry pattern) ──────────────────────────

  llm_providers:
    description: "Extensible LLM provider registry — Settings UI and Agent factory auto-discover from registry"
    registry:
      shell_types: "shell/src/lib/llm/types.ts — LlmProviderMeta, LlmModelMeta, LlmVoiceMeta"
      shell_registry: "shell/src/lib/llm/registry.ts — registerLlmProvider(), listLlmProviders(), isOmniModel(), modelHasCapability(), formatModelLabel()"
      shell_barrel: "shell/src/lib/llm/index.ts"
      agent_types: "agent/src/providers/registry.ts — LlmProviderDefinition, registerLlmProvider()"
      agent_factory: "agent/src/providers/factory.ts — provider registrations + buildProvider()"
    model_capability_system:
      description: "Extensible capability tag system on LlmModelMeta — replaces binary type field"
      shared_type: "shell/src/lib/types.ts — ModelCapability = 'llm' | 'omni' | 'asr' | 'stt' | 'tts' | 'vlm' | 'world'"
      field: "capabilities: ModelCapability[] (array, may hold multiple tags)"
      helper: "modelHasCapability(providerId, modelId, cap) — check single capability"
      isOmniModel: "delegates to modelHasCapability(p, m, 'omni') — backward-compatible"
      rationale: "#45 — future model types (ASR-only, VLM, world models) need no interface change"
      omni_models: "Gemini 2.5 Flash Live, GPT-4o Realtime — capabilities: ['llm', 'omni']"
    providers:
      - "nextain (Naia Cloud — naiaKey, Gemini models via gateway)"
      - "claude-code-cli (local Claude CLI subscription — no API key)"
      - "gemini (Google Gemini API — GEMINI_API_KEY)"
      - "openai (OpenAI GPT — OPENAI_API_KEY, includes GPT-4o Realtime omni)"
      - "anthropic (Anthropic Claude API — ANTHROPIC_API_KEY)"
      - "xai (xAI Grok — XAI_API_KEY)"
      - "zai (Zhipu GLM — ZHIPU_API_KEY)"
      - "ollama (local, no API key)"
      - "vllm (local vLLM server — OpenAI-compatible API, no API key, vllmHost configurable)"
    adding_provider: "See CONTRIBUTING.md 'Adding an LLM provider' section"
    type_system: "ProviderId = string (extensible via registry, no hardcoded union)"

  # ── STT Providers (independent, pipeline mode) ─────────────────

  stt_providers:
    description: "Independent STT provider registry — used only in pipeline mode (standard LLM models)"
    note: "Omni models have built-in speech recognition (inputTranscription) and do NOT use these providers"
    registry:
      shell_types: "shell/src/lib/stt/types.ts — SttProviderMeta, SttModelMeta"
      shell_registry: "shell/src/lib/stt/registry.ts — registerSttProvider(), getSttProvider(), listSttProviders()"
      shell_barrel: "shell/src/lib/stt/index.ts — built-in provider registration"
    providers:
      vosk:
        engine: "vosk"
        type: "offline, streaming"
        description: "Lightweight offline STT, ~40-80MB models per language, real-time streaming"
        models:
          - {id: "vosk-model-small-ko-0.22", size: "82MB", wer: "28.1%"}
          - {id: "vosk-model-small-en-us-0.15", size: "40MB", wer: "9.85%"}
          - {id: "vosk-model-small-ja-0.22", size: "48MB", wer: "—"}
      whisper:
        engine: "whisper"
        type: "offline, batch (inference every 2s or 1.5s silence)"
        description: "OpenAI Whisper via whisper-rs (whisper.cpp bindings), higher accuracy, GPU-accelerated"
        models:
          - {id: "whisper-tiny", size: "75MB", wer: "~40%"}
          - {id: "whisper-base", size: "142MB", wer: "~30%"}
          - {id: "whisper-small", size: "466MB", wer: "~20%"}
          - {id: "whisper-medium", size: "1.5GB", wer: "~12%"}
          - {id: "whisper-large-v3", size: "3GB", wer: "~8%"}
        cuda:
          description: "NVIDIA GPU acceleration via upstream whisper-rs cuda feature"
          feature_flag: "cuda (Cargo feature on naia-shell → tauri-plugin-stt → whisper-rs/cuda)"
          build_requirement: "CUDA toolkit (nvcc) required at build time"
          note: "Uses upstream whisper-rs directly (codeberg.org/tazz4843/whisper-rs)"
      google: {status: "disabled in UI (future)"}
      elevenlabs: {status: "disabled in UI (future)"}
    runtime:
      backend: "tauri-plugin-stt (Rust) — Vosk streaming + Whisper batch engine"
      files:
        - "shell/src-tauri/plugins/tauri-plugin-stt/src/desktop.rs — Vosk streaming + Whisper batch"
        - "shell/src-tauri/plugins/tauri-plugin-stt/src/models.rs — ListenConfig with engine/modelId"
        - "shell/src-tauri/src/stt_models.rs — model catalog, download, delete, migration"
      models_dir: "~/.local/share/com.naia.shell/stt-models/"
      build_deps: "cmake + LLVM/libclang (for whisper-rs-sys bindgen)"
    config_fields: "sttProvider ('vosk'|'whisper'), sttModel (model_id string)"
    settings_ui: "STT provider dropdown + model list with size/WER/download/delete buttons"
    first_install: "no sttProvider set → voice button shows popup → navigate to settings"

  # ── TTS Providers (independent, pipeline mode) ─────────────────

  tts_providers:
    description: "Independent TTS provider registry — Shell handles all TTS via SentenceChunker (both chat and pipeline)"
    note: "Omni models produce voice output directly and do NOT use these providers"
    default_provider: "edge (free, no login required)"
    registry:
      agent_types: "agent/src/tts/types.ts — TtsProviderDefinition, TtsSynthesizeOptions"
      agent_registry: "agent/src/tts/registry.ts — registerTtsProvider(), synthesize(), listTtsProviders()"
      agent_barrel: "agent/src/tts/index.ts — side-effect imports + re-exports"
      shell_types: "shell/src/lib/tts/types.ts — TtsProviderMeta"
      shell_registry: "shell/src/lib/tts/registry.ts — shell-side metadata for Settings UI"
    pattern: |
      Map-based registry with self-registration at module load.
      Each provider file calls registerTtsProvider() at top level.
      Barrel file (tts/index.ts) imports all providers to trigger registration.
    adding_provider: |
      1. Create agent/src/tts/{name}.ts
      2. Implement TtsProviderDefinition interface (synthesize + metadata)
      3. Call registerTtsProvider({...}) at module scope
      4. Add import in agent/src/tts/index.ts
      5. Add TtsProviderMeta in shell/src/lib/tts/registry.ts (for Settings UI)
    providers:
      edge:
        route: "Shell SentenceChunker → requestTts IPC → agent → msedge-tts (direct)"
        auth: "none"
      nextain:
        route: "Shell SentenceChunker → requestTts IPC → agent → any-llm gateway /v1/audio/speech"
        auth: "naiaKey via X-AnyLLM-Key header"
      google:
        route: "Shell SentenceChunker → requestTts IPC → agent → Google Cloud TTS API (direct)"
        auth: "Google API key"
      openai:
        route: "Shell SentenceChunker → requestTts IPC → agent → OpenAI TTS API (direct)"
        auth: "OpenAI API key"
      elevenlabs:
        route: "Shell SentenceChunker → requestTts IPC → agent → ElevenLabs API (direct)"
        auth: "ElevenLabs API key"
    naiaKey_routing: |
      TTS auth (naiaKey) is independent of LLM provider selection.
      ChatRequest carries naiaKey as top-level field, so Naia Cloud TTS works
      even when LLM is set to gemini/openai/xai/anthropic.
    engine_selection: |
      ttsEngine is derived from ttsProvider:
      - google, nextain → "google" engine (direct Google Cloud TTS)
      - edge, openai, elevenlabs → "gateway" engine (via Naia Gateway)
    settings_ui: "TTS provider dropdown + API key input + voice picker (auto-discovery from registry)"
    pricing:
      edge: "Free"
      nextain: "Naia credit — actual cost returned from gateway (cost_usd in response)"
      google: "Voice tier-based: Neural2/Wavenet $16/1M, Chirp3-HD $16/1M, Standard $4/1M"
      openai: "$15/1M chars (tts-1)"
      elevenlabs: "$0.30/1K chars"

  # ── Testing ────────────────────────────────────────────────────

  testing:
    description: "123+ tests — real API keys, actual audio verification, STT×TTS combos"
    total: "123+ tests (103 Tauri + 10 Playwright + 10+ unit)"
    tauri_e2e:
      - "76-tts-provider-switching (12) — TTS dropdown, API key, voice, Edge preview"
      - "77-stt-provider-switching (7) — STT dropdown, order free→Naia→paid, API key"
      - "78-voice-pipeline-mode (11) — UI labels, voice picker, button states, 🗣️ icon"
