      cd agent && pnpm test                                          # Agent tests
      cd shell && source ../my-envs/naia-os-shell.env
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/80-tts-preview-all-providers.spec.ts
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/84-chat-tts-per-provider.spec.ts
      npx wdio run e2e-tauri/wdio.conf.ts --spec e2e-tauri/specs/83-tts-per-model-verification.spec.ts
      npx playwright test e2e/pipeline-voice.spec.ts                 # Pipeline STT→LLM→TTS

  # ── Pipeline Voice (STT → LLM → TTS) ──────────────────────────

  pipeline_voice:
    description: "Voice conversation for standard (non-omni) LLM models via independent STT → LLM → TTS pipeline"
    updated: "2026-03-14"
    status: "implemented — TTS pipeline working, STT (Vosk + Whisper) working"
    architecture: |
      User speaks → STT provider (Vosk/Whisper, offline) → recognized text
      → sendChatMessage (normal LLM path, tools disabled, Agent auto-TTS disabled)
      → LLM streams text → SentenceChunker (sentence boundary detection)
      → emotion tag/emoji stripped → per-sentence tts_request → TTS provider (Edge default)
      → MP3 base64 → AudioQueue (sequential playback with error logging)
    components:
      sentence_chunker:
        file: "shell/src/lib/voice/sentence-chunker.ts"
        description: "Korean+English mixed text, hard punct split (.!?。！？~), min 10 / max 120 chars"
      audio_queue:
        file: "shell/src/lib/voice/audio-queue.ts"
        description: "Sequential MP3 base64 playback, interrupt support, avatar speaking state"
      tts_request:
        agent: "agent/src/index.ts handleTtsRequest() + agent/src/protocol.ts TtsRequest"
        shell: "shell/src/lib/chat-service.ts requestTts()"
      logger_bridge:
        description: "Frontend Logger bridges to Rust stderr via frontend_log command for terminal diagnostics"
        files: ["shell/src/lib/logger.ts", "shell/src-tauri/src/lib.rs"]
    state_flow: "LISTENING → PROCESSING → SPEAKING → LISTENING"
    interrupt: "STT active during playback — user speech clears AudioQueue + cancels LLM stream"
    debounce: "1000ms for multi-utterance merging"
    rules: |
      - Tools DISABLED in pipeline mode (prevents tool loops blocking TTS)
      - Agent auto-TTS DISABLED (frontend handles per-sentence TTS via SentenceChunker)
      - Emotion tags ([HAPPY] etc.) and emoji stripped before TTS
    gateway_separation: "STT/TTS fully decoupled from Naia Gateway. Shell handles all STT/TTS directly via agent IPC. Gateway used only for LLM routing + skills/tools."
    naia_cloud:
      tts_endpoint: "https://naia-gateway-181404717065.asia-northeast3.run.app/v1/audio/speech"
      stt_endpoint: "https://naia-gateway-181404717065.asia-northeast3.run.app/v1/audio/transcriptions"
      auth: "X-AnyLLM-Key: Bearer {naiaKey}"
      pricing_tts: "$0.000016/char (Neural2)"
      pricing_stt: "$0.006/15s"
      test_key_env: "NAIA_API_KEY in shell/.env"
    cost_tracking:
      llm: "agent calculateCost() — client-side estimation from model pricing table"
      tts: |
        Two modes:
        - Naia Cloud (nextain): gateway returns cost_usd → Shell uses server cost directly
        - Direct API (google/openai/elevenlabs): Shell estimateTtsCost(provider, length, voice) — voice tier-based for Google, flat rate for others
        Agent TtsSynthesizeResult carries { audio, costUsd? } through pipeline.
        Accumulated on assistant message via addCostEntry.
      stt: "Shell estimateSttCost() — per-API-call, stored in sessionCostEntries[] via addSessionCostEntry(). Shown in CostDashboard breakdown by provider/model (e.g. stt:nextain). Not attached to messages."
      note: "Client estimates may differ from gateway actual (e.g. Gemini free tier = $0)"
    files:
      - "shell/src/components/ChatPanel.tsx — pipeline refs, handleVoiceToggle, handleChunk pipeline logic"
      - "shell/src/lib/voice/sentence-chunker.ts"
      - "shell/src/lib/voice/audio-queue.ts"
      - "shell/src/lib/chat-service.ts — requestTts()"
      - "agent/src/index.ts — handleTtsRequest()"

  # ── Shared ─────────────────────────────────────────────────────

  voice_gender_defaults: |
    Default voice is automatically set based on VRM avatar gender:
    - VRM models 1,3 (female) → liveVoice: "Kore", Edge TTS: "ko-KR-SunHiNeural", Google TTS: "ko-KR-Neural2-A"
    - VRM models 2,4 (male) → liveVoice: "Puck", Edge TTS: "ko-KR-InJoonNeural", Google TTS: "ko-KR-Neural2-C"
    Logic: avatar-presets.ts → getDefaultVoiceForAvatar(), getDefaultTtsVoiceForAvatar()
    On Naia login: if Lab has saved liveVoice, use it; otherwise auto-set from VRM gender.

  billing:
    omni_models:
      pricing: "Varies by provider (Gemini: $0.10/M input + $0.40/M output, OpenAI: ~$0.10/min)"
      tracking: "usage_metadata accumulated per turn, charged on session disconnect"
      file: "project-any-llm/src/any_llm/gateway/routes/live.py (_log_live_usage)"
    tts:
      pricing: "Varies by provider (Chirp 3 HD, Neural2, Edge free, OpenAI, ElevenLabs)"
      tracking: "Per-request via any-llm gateway /v1/audio/speech"
