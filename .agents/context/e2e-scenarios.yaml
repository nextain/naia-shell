# ─── Proposed new scenarios (from this session's findings + gaps audit) ────
proposed:
  - id: S101
    feature: "Multi-turn chat (N consecutive turns share context)"
    status: proposed
    rationale: "S003 covers only single-turn. Multi-turn context retention is a core LLM capability we never assert."
    test_outline: |
      turn 1: "내 이름은 Tester"
      turn 2: "내 이름이 뭐였지?"
      assert: response mentions "Tester"
    manual_topic: "chat-multi-turn.md"
  - id: S102
    feature: "Secure-store hygiene on provider switch"
    status: proposed
    rationale: "Root cause of #329 — apiKey field collides with naiaKey because no auto-cleanup. New spec asserts that switching provider from gemini → nextain clears stale apiKey from secure-keys.dat."
    test_outline: |
      step 1: settings → gemini provider + apiKey set
      step 2: settings → nextain provider + naiaKey set
      assert: getSecretKey('apiKey') === null after save
    manual_topic: "settings-provider-switch.md"
  - id: S103
    feature: "OAuth callback path coverage (deep-link → secure store)"
    status: proposed
    rationale: "e2e ensureAppReady currently bypasses OAuth path via direct localStorage. Add a spec that simulates the deep-link callback so e2e matches prod login flow."
    test_outline: |
      step 1: trigger Naia auth deep-link with naiaKey payload
      step 2: assert secure-store has naiaKey, apiKey empty, agent received auth_update
    manual_topic: "login-oauth.md"
  - id: S104
    feature: "skill_time end-to-end with deterministic LLM prompt"
    status: proposed
    rationale: "S004 currently broken because LLM picks other tools. Either restrict tool list at chat_request time OR strengthen system prompt to force skill_time only."
    test_outline: |
      step 1: chat_request with allowedTools=[skill_time] only
      step 2: send 'HH:MM 형식으로 현재 시각'
      assert: tool_use=skill_time success
    manual_topic: "skills-tool-routing.md"
  - id: S105
    feature: "Memo persistence across app restarts"
    status: proposed
    rationale: "S006 covers create+recall within one session. Add multi-restart persistence assertion."
    test_outline: |
      restart 1: create memo
      restart 2: recall memo, assert content intact
    manual_topic: "memo-persistence.md"
  - id: S106
    feature: "Ebbinghaus decay verifies older memories down-rank"
    spec_file: "shell/e2e-tauri/specs/97-memory-decay.spec.ts"
    status: proposed-blocked
    rationale: "Memory system v6.0 has decay but no assertion proves it actually affects recall ranking."
    test_outline: |
      step 1: encode 3 memories at t-7d, t-1d, t-0 (via mock clock)
      step 2: advance_clock IPC to fast-forward 7 days deterministically
      step 3: recall query that matches all 3
      assert: t-0 ranks first, t-7d last
    blocked_on: |
      The CLI memory path (naia-agent buildCliMemory) uses
      LiteMemoryProvider, which (a) ranks by raw cosine only — no decay
      term in scoring (lite-provider.ts:163-186), (b) has a no-op
      consolidate() under preservation-first anchor #6
      (lite-provider.ts:189-197), and (c) exposes no clock injection
      point on the constructor (lite-provider.ts:84-101). The heavier
      MemorySystem (which carries Ebbinghaus decay via decay.ts) is not
      wired into the CLI path. Phase 4's advance_clock IPC therefore
      has nothing in-process to advance for the CLI memory path — it
      would falsely PASS rather than measure decay.
    unblock_path: |
      Either (a) add a clock-injectable decay ranker to
      LiteMemoryProvider (constructor `clock?: () => number` option +
      time term in cosine score), or (b) switch buildCliMemory to
      MemorySystem and thread a clock through that path. Both are
      naia-memory-side changes — out of scope for naia-os #332.
    manual_topic: "memory-decay.md"
    coverage: "placeholder spec self-skips; records target contract until upstream dependency lands"
  - id: S107
    feature: "Cost dashboard graceful UX on fetch failure"
    status: proposed
    rationale: "S011 covers happy path only. When gateway returns 5xx, dashboard should show fallback UI rather than blank."
    test_outline: |
      step 1: mock gateway balance endpoint to 503
      assert: dashboard renders 'temporarily unavailable' card
    manual_topic: "diagnostics-cost-dashboard.md"
  - id: S108
    feature: "Notify skill retries on transient webhook 429"
    status: proposed
    rationale: "S017 covers single-shot POST. Add 429 retry-with-backoff assertion."
    manual_topic: "channels-rate-limit.md"
  - id: S109
    feature: "Voice clone (ElevenLabs voice ID)"
    status: proposed
    rationale: "S024b covers TTS provider switching but not voice ID selection."
    manual_topic: "voice-clone.md"
  - id: S110
    feature: "Browser panel — naia.nextain.io tab embed"
    status: proposed
    rationale: "Browser panel skills exist (skill_browser_*) but no e2e covers the panel UI itself."
    test_outline: "open naia.nextain.io in browser panel, assert skill_browser_get_text returns 'Naia'"
    manual_topic: "browser-panel.md"
  - id: S113
    feature: "Memory encoder fallback to bundled offline ONNX when gateway embed 5xx"
    spec_file: "shell/e2e-tauri/specs/95-memory-encoder-fallback.spec.ts"
    status: implemented
    rationale: "Gateway embedding endpoint failures must not crash the recall pipeline — agent should fall back to the bundled offline ONNX embedder and keep top-3 recall quality."
    test_outline: |
      step 1: configure memoryMode=local + memoryEmbedding=gateway (custom + bad base URL)
      step 2: encode a high-similarity fact ("쿼츠 키보드")
      step 3: new conversation → recall query
      assert: fallback embedder still surfaces the fact in the LLM response (top-3 inclusion proxy)
    manual_topic: "memory.md"
    coverage: "fallback trigger + recall quality preservation (Phase-4 gap: agent-side runtime fallback not yet wired — see naia-agent buildCliMemory:542-578)"
  - id: S111
    feature: "Memory backup export/import round-trip (AES-256-GCM)"
    spec_file: "shell/e2e-tauri/specs/96-memory-backup.spec.ts"
    status: implemented
    rationale: "Backup is the user's only 'move my memory between machines' / 'snapshot before risky change' surface. Encryption is library-tested; the integration path (shell IPC → Rust → agent → memorySystem → adapter export/import) needs an e2e contract."
    test_outline: |
      step 1: seed 3 distinct facts via skill_memo natural language
      step 2: snapshot fact set via memory_get_all_facts IPC
      step 3: export backup via memory_export_backup IPC with session-local password
      step 4: wipe by iterating memory_delete_fact over every fact id (memory-only wipe; not factory_reset)
      step 5: import backup via memory_import_backup IPC with the same password
      assert: post-import fact count == pre-wipe count, every pre-wipe content string reappears, sentinels present
    manual_topic: "memory.md"
    coverage: "round-trip without data loss (count + content + sentinel parity); password is session-local per §8.2 in-memory-only design decision"
    deferred_dependencies:
      - "#327 — backup-panel UI controls are still disabled; spec drives IPC directly so it does NOT depend on the UI re-enable. A UI click-through spec is added once #327's separate fix re-exposes the buttons."
