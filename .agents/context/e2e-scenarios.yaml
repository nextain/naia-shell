# Schema:
#   id:              S{NNN} — sequential
#   feature:         user-facing capability (one-line)
#   spec_file:       shell/e2e-tauri/specs/*.spec.ts (when implemented)
#   status:          implemented | partial | proposed | broken
#   coverage:        what the spec actually asserts
#   gaps:            what is NOT covered (informs new specs)
#   manual_topic:    .users/guides/manual/<topic>.md (when user-facing)

