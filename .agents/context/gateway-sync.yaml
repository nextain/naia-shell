description: Shell → Naia Gateway config synchronization architecture.

purpose: >
  Keep Naia Gateway bootstrap files (gateway config, auth-profiles.json, SOUL.md,
  IDENTITY.md, USER.md) in sync with Shell user settings so that Gateway
  interactions (Discord DM, TTS, etc.) use the same persona and credentials
  as the Shell.

trigger_points:
  - Settings save (SettingsTab.handleSave)
  - Onboarding complete (OnboardingWizard.handleComplete)
  - Lab auth callback (lab_auth_complete event)
  - App startup (session load useEffect in ChatPanel)
  - After session summarization (summarizePreviousSession)
  - After auto fact extraction (every 10 messages / visibilitychange)
  - After reverse sync from Gateway memory files
  - ADK path change (sendConfigUpdate NAIA_ADK_PATH to agent)
  - Factory reset (sendFactoryReset IPC to agent + local cleanup)
  - Discord bot token restore (sendConfigUpdate secrets to agent)

sync_items:
  - target: gateway.json
    fields: [provider, model]
    mapping:
      gemini: google
      anthropic: anthropic
      xai: xai (Grok-compatible)
      openai: openai
      nextain: nextain (Lab proxy)
      claude-code-cli: anthropic
      ollama: ollama

  - target: auth-profiles.json
    fields: [apiKey]
    note: Skipped for Lab proxy (nextain) and keyless providers.

  - target: SOUL.md
    content: Full system prompt from buildSystemPrompt()
    includes:
      - Persona text (with name substitution)
      - Emotion tag instructions
      - User name context
      - Known facts about the user (from Shell facts DB)
      - Language/locale instructions
    note: >
      syncToGateway() is self-contained — always loads config + facts internally.
      Caller's _systemPrompt parameter is ignored. This ensures ALL sync paths
      (settings, startup, auto-extraction) include facts consistently.

  - target: IDENTITY.md
    content: "agentName value"

  - target: USER.md
    content: "userName value"

key_files:
  - shell/src/lib/gateway-sync.ts           # syncToGateway() — self-contained
  - shell/src/lib/memory-sync.ts            # reverse sync (Gateway → Shell facts)
  - shell/src/lib/memory-processor.ts       # extractFacts(), summarizeSession()
  - shell/src/lib/persona.ts                # buildSystemPrompt()
  - shell/src/lib/db.ts                     # getAllFacts(), upsertFact()
  - shell/src/components/ChatPanel.tsx       # auto-extraction triggers
  - shell/src/components/SettingsTab.tsx     # handleSave trigger
  - shell/src/components/OnboardingWizard.tsx # handleComplete trigger
  - shell/src-tauri/src/lib.rs              # sync_gateway_config, read_gateway_memory_files

chat_routing:
  description: Chat messages can be routed through Gateway for unified sessions
  setting: AppConfig.chatRouting ("auto" | "gateway" | "direct", default "auto")
  agent_field: ChatRequest.routeViaGateway (boolean)
  behavior:
    auto: Route via Gateway when connected + tools enabled; fallback to direct LLM
    gateway: Always route via Gateway
    direct: Always use direct LLM (original behavior, bypasses Gateway)
  key_files:
    - agent/src/gateway/gateway-chat.ts
    - shell/src/lib/config.ts

session_sot:
  description: Gateway is the Single Source of Truth for sessions and messages
  rationale: >
    Shell local DB (memory.db) previously duplicated session/message storage.
    Gateway already stores all conversations (including Discord channels).
    Local DB is now facts-only; sessions are managed via Gateway skill_sessions RPC.
  shell_local_db:
    retained: [facts]
    removed: [sessions, messages, messages_fts, message_embeddings]
  gateway_rpc:
    list: skill_sessions action=list
    history: skill_sessions action=history key=<session_key>
    delete: skill_sessions action=delete key=<session_key>
    patch: skill_sessions action=patch key=<session_key> metadata={summary}
    reset: skill_sessions action=reset key=<session_key>
  key_files:
    - shell/src/lib/gateway-sessions.ts  # Gateway session service layer
    - shell/src/lib/db.ts                # Facts-only (shrunk from ~230 to ~35 lines)
    - shell/src-tauri/src/memory.rs      # Facts-only (shrunk from ~1230 to ~160 lines)

memory_sync:
  description: >
    Dual-origin memory architecture: Shell owns facts (who the user is),
    Gateway owns sessions (what happened). Memory sync bridges both.

  shell_to_gateway:
    description: Facts are injected into SOUL.md via syncToGateway()
    flow: getAllFacts() → buildSystemPrompt(facts) → sync_gateway_config(persona)
    triggers:
      - App startup
      - Settings save
      - After session summarization
      - After auto fact extraction (every 10 messages)
      - After visibilitychange (app background, 3+ unextracted messages)
      - After reverse sync extracts new facts

  auto_extraction:
    description: >
      Lightweight fact extraction during conversation without full summarization.
      Uses extractFacts() only (no summarizeSession()).
    triggers:
      - Every 10 new messages (usage chunk handler)
      - App goes to background (visibilitychange, threshold 3 messages)
    tracking: lastExtractedIdx ref in ChatPanel (reset on remount)
    file: shell/src/components/ChatPanel.tsx

  gateway_to_shell:
    description: >
      Reverse sync: reads Gateway workspace/memory/*.md files,
      extracts facts via LLM, upserts into Shell facts DB.
flow: read_gateway_memory_files(since_ms) → extractFacts() → upsertFact() → syncToGateway()
    schedule: 5s after app start, then every 30 minutes
    file: shell/src/lib/memory-sync.ts
rust_command: read_gateway_memory_files (reads ~/.naia/workspace/memory/*.md)

  session_memory_hook:
    description: >
      Gateway internal hook that saves conversations to workspace/memory/*.md.
      Enabled via bootstrap config and ensure_gateway_config() patches.
config_path: hooks.internal.entries.session-memory.enabled = true
sot: config/defaults/gateway-bootstrap.json

bootstrap:
  description: >
First-launch config creation for Flatpak/ISO installs where install-gateway.sh
does not run. ensure_gateway_config() in lib.rs is the single bootstrap path.
  function: ensure_gateway_config (lib.rs)
  called_from:
    - spawn_gateway (before launching Gateway process)
    - sync_gateway_config (before reading/writing config)
  behavior:
    no_config: Creates full minimal config matching install-gateway.sh defaults
    existing_config_missing_mode: Patches gateway.mode=local into existing file
    existing_config_ok: No-op
  required_fields:
    - gateway.mode: "local"       # Gateway refuses to start without this
    - gateway.port: 18789
    - gateway.bind: "loopback"
    - gateway.auth.mode: "token"
    - gateway.reload.mode: "off"  # Prevent file-watcher race conditions
    - agents.defaults.workspace: "~/.naia/workspace"
    - session.dmScope: "per-channel-peer"
    - hooks.internal.enabled: true
    - hooks.internal.entries.session-memory.enabled: true

constraints:
  - Gateway source code is modifiable (naia-agent is first-party)
  - Sync is best-effort; errors are logged but never block UI
  - SOUL.md receives the FULL system prompt (emotion tags + name + context)
  - gateway.mode=local is REQUIRED — without it Gateway exits immediately
