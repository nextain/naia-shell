#
# Lessons Learned
#
# Accumulated lessons from development cycles.
# Read during INVESTIGATE phase. Written during SYNC phase.
#
# T6: Knowledge Continuity — scope field identifies WHERE a lesson applies.
# This enables future AI sessions to find relevant lessons by the files they are about to touch.
#
# Schema:
#   id:         L{NNN} — sequential
#   date:       YYYY-MM-DD
#   issue:      "#N" (optional for workflow-level lessons)
#   category:   keyword (testing, observability, upstream-integration, workflow, audio, ...)
#   scope:      file glob or module name — OMIT for global/workflow-level lessons
#               Examples: "shell/src/audio/*", "agent/llm-registry", ".claude/hooks/*"
#   title:      one-line summary
#   problem:    what went wrong
#   root_cause: why it went wrong
#   fix:        what was changed
#   reference:  link to doc (optional)

version: 1
name: lessons-learned
mirror:
  users: .users/context/lessons-learned.md
  users_ko: .users/context/ko/lessons-learned.md

lessons:

  - id: L001
    date: "2026-03-15"
    issue: "#60"
    category: testing
    title: "E2E incomplete but marked as complete"
    problem: "LLM Provider Registry (#60) was marked as 5-phase complete, but E2E provider switching tests were blocked by infrastructure issues (tauri-driver SIGINT). Work was reported as 'done' without actual E2E verification."
    root_cause: "No rule requiring E2E completion before marking work done. AI success bias — uncertain state reported as complete."
    fix: "Added test_attitude rules, diagnose step in on_failure, success_bias_reporting in AI behavioral traps."
    reference: "docs-work-logs/luke/report/20260315-harness-context-quality-audit.md"

  - id: L002
    date: "2026-03-15"
    category: testing
    title: "Test pass ≠ correct behavior"
    problem: "AI loosened test assertions to make failing tests pass instead of investigating app code bugs."
    root_cause: "e2e_test phase output was defined as 'Passing E2E test', making 'pass' the explicit goal. No anti-patterns for test gaming."
    fix: "Output redefined to 'E2E diagnostic complete'. Added test_attitude anti-patterns (assertion loosening, expected value gaming, test deletion)."

  - id: L003
    date: "2026-03-15"
    category: observability
    title: "Debug logging added only after bugs discovered"
    problem: "When a bug occurred, first step was always adding Logger.debug() — meaning the first occurrence was always undiagnosed."
    root_cause: "debug_logging rules specified what and how to log, but not WHEN (build-time vs debug-time)."
    fix: "Added debug_logging.when rule: 'Debug logging is a BUILD-TIME activity'. Added to review checklists."

  - id: L004
    date: "2026-03-18"
    issue: "#73"
    category: upstream-integration
    title: "Landscape research skipped — wrong upstream target discovered after full implementation"
    problem: "Implemented SupportsAudioOutput in a vllm fork only to discover vllm-omni is the correct upstream target. Audio output was explicitly scoped out of vllm main (RFC #16052). Full implementation wasted."
    root_cause: "No pre-work research step before forking. RFC history not checked. Sub-project existence (vllm-omni) not discovered. No upstream issue opened before coding."
    fix: "Added upstream-contribution.yaml workflow: landscape research required before any implementation (scope check, AI policy, RFC history, sub-project discovery, maintainer stance). Progress file upstream_issue_ref field added. commit-guard advisory for upstream contributions."
    reference: ".agents/context/upstream-contribution.yaml"

  - id: L005
    date: "2026-03-19"
    issue: "#89"
    category: workflow
    title: "Context compaction skips mandatory reads — rules not followed in resumed session"
    problem: "When context was compacted and session resumed from summary, AI jumped directly into implementation without performing mandatory reads (agents-rules.json, ai-work-index.yaml, project-index.yaml). Result: build-time logging skipped, iterative review not done, success_bias_reporting triggered, user felt AI was developing autonomously without oversight."
    root_cause: "CLAUDE.md mandatory reads require 'every session start'. But compacted resumption is treated as a continuation, not a new session — the mandate was never triggered. Summary did not contain a reminder to re-read rules."
    fix: "After context compaction, the resumed session MUST treat itself as a new session start: read agents-rules.json before proceeding with any implementation. Progress file (.agents/progress/*.json) must be maintained so resumed sessions know which phase/gate they are in."

  - id: L006
    date: "2026-03-20"
    issue: "#89"
    category: ipc
    scope: "shell/src/components/PanelInstallDialog.tsx, agent/src/index.ts"
    title: "panel_install_result must arrive before panel_control reload — timing is critical"
    problem: "PanelInstallDialog auto-close logic depends on successRef being set by panel_install_result. If panel_control reload arrives first, successRef is still false → dialog never closes even on success."
    root_cause: "actionInstall internally emits panel_control reload at the end. The agent wrapper did not suppress this and emitted its own reload after the result — but order was not guaranteed."
    fix: "Agent panel_install handler passes writeLine: () => undefined to actionInstall (suppresses inner panel_control). After awaiting result, it explicitly emits panel_install_result FIRST, then panel_control reload (only if success). Order is now deterministic."

  - id: L007
    date: "2026-03-20"
    issue: "#89"
    category: ipc
    scope: "shell/src/components/PanelInstallDialog.tsx, shell/src/lib/chat-service.ts"
    title: "Events without requestId cannot use chat-service requestId filter — must use direct listen()"
    problem: "panel_install_result has no requestId field. chat-service.ts filter drops any chunk where chunk.requestId !== requestId, so panel_install_result was silently discarded."
    root_cause: "requestId filter was written for chat responses (all of which carry requestId). New event types that originate outside the normal chat flow do not carry requestId."
    fix: "PanelInstallDialog uses Tauri listen('agent-response-chunk') directly, bypassing chat-service. TypeScript type check also required guard: !('requestId' in chunk) || chunk.requestId !== requestId."

  - id: L008
    date: "2026-03-20"
    issue: "#89"
    category: naming
    scope: "agent/src/skills/built-in/panel.ts, shell/src-tauri/src/panel.rs, docs/"
    title: "Terminology drift (app vs panel) causes widespread confusion — pick one and enforce"
    problem: "Mid-implementation, 'app' terminology was partially adopted (app.json, ~/.naia/apps/, 'app_list_installed'). Mixed with existing 'panel' terms, creating broken file references and confusing documentation."
    root_cause: "Naming decision was made informally and not propagated atomically across all files. Each file was updated independently without a checklist."
    fix: "Reverted all 'app' terms back to 'panel'. Enforced: panel.json, ~/.naia/panels/, panel_list_installed, panel_remove_installed, PanelDescriptor. Added critical_gotchas.terminology note in architecture.yaml."

  - id: L009
    date: "2026-03-20"
    issue: "#95"
    category: process-management
    scope: "shell/src-tauri/src/browser.rs"
    title: "kill -0 succeeds on zombie processes — CDP health check required to detect Chrome death"
    problem: "When Chrome was killed with SIGKILL, it became a zombie (parent hadn't reaped it). libc::kill(pid, 0) returns 0 (success) for zombies because the PID still exists in the process table. The monitor thread never emitted browser_closed, so the frontend never showed the error UI."
    root_cause: "kill -0 is a live/dead check at the OS level, not a responsive-process check. A zombie occupies a PID slot but serves no HTTP."
    fix: "Added CDP /json/version health check as secondary detector: if kill -0 succeeds but CDP refuses connection, Chrome is a zombie → emit browser_closed. See spawn_chrome_monitor() in browser.rs."

  - id: L010
    date: "2026-03-20"
    issue: "#95"
    category: frontend
    scope: "shell/src/panels/browser/*"
    title: "CEF Rust bindings not production-ready as of 2026 — use Chrome binary + XReparentWindow"
    problem: "Considered using CEF (Chromium Embedded Framework) Rust bindings for an embedded browser. All available Rust CEF crates (cef-rs, chromium, etc.) are experimental, unmaintained, or archived as of 2026."
    root_cause: "CEF Rust ecosystem is immature. CEF itself is a C++ library and Rust bindings lag behind significantly."
    fix: "Use Chrome binary subprocess + X11 XReparentWindow (x11rb) for embedding. Achieves identical UX: user sees Chromium, CDP is available for AI. Requires GDK_BACKEND=x11 (XWayland mode) and must run via distrobox (not host Bazzite) for GTK/WebKit library linking."

  - id: L011
    date: "2026-03-20"
    issue: "#95"
    category: provider
    scope: "agent/src/providers/lab-proxy.ts"
    title: "gemini-2.5-flash-live is WebSocket-only — sending it to SSE /v1/chat/completions returns silent 0-byte body"
    problem: "User set LLM model to gemini-2.5-flash-live for text chat. Lab proxy sent it to Vertex AI /v1/chat/completions (SSE endpoint). Vertex AI returned 200 OK with a completely empty body — no data, no error. App threw 'empty SSE stream' error."
    root_cause: "Gemini Live models are WebSocket-only (Live API). Vertex AI's REST endpoint does not support them and silently returns an empty 200 response instead of a proper error."
    fix: "Added toGatewayModel() mapping in lab-proxy.ts: 'gemini-2.5-flash-live' → 'vertexai:gemini-2.5-flash'. Also added bytesReceived==0 guard to detect silent 0-byte streams with a clear error message."

  - id: L012
    date: "2026-03-20"
    issue: "#95"
    category: voice
    scope: "shell/src/components/ChatPanel.tsx, shell/src/lib/voice/*"
    title: "Voice session must receive tools via session.connect() — Gemini says 'tools off' without it"
    problem: "Gemini Live voice session said '내 도구 사용 설정이 꺼져 있어서 (tools are disabled)' even when config.enableTools=true. User could see the tools toggle was on. The AI's voice responses showed it thought tools weren't available."
    root_cause: "session.connect() was called without a tools parameter. Gemini Live's function_declarations field was empty. Even if the system prompt mentioned tools, Gemini won't call them unless they're declared in the session setup."
    fix: "ChatPanel reads active panel tools from panelRegistry.get(activePanelId)?.tools, maps them to ToolDeclaration format, and passes to session.connect({ tools: voiceTools, systemInstruction: voiceSystemPrompt }). System prompt also appended with explicit tool list and 'call them proactively' instruction."

  - id: L013
    date: "2026-03-20"
    issue: "#95"
    category: css
    scope: "shell/src/styles/global.css, shell/src/components/SettingsTab.tsx"
    title: "position:fixed overlays cover full viewport including embedded Chrome X11 area"
    problem: "STT model modal (.sync-dialog-overlay uses position:fixed; left:0; right:0) appeared over the Chrome X11 embedded area instead of staying within the naia chat panel."
    root_cause: "position:fixed positions relative to the viewport, which includes the full window width. The Chrome X11 window is embedded at x > naia-panel-width, so fixed overlays that stretch to right:0 cover the Chrome area."
    fix: "Added .panel-modal-overlay class with width: var(--naia-width, 320px) instead of right:0. Modals that must stay within the panel should use this class rather than the full-viewport .sync-dialog-overlay."

  - id: L014
    date: "2026-03-21"
    issue: "#99"
    category: css
    scope: "shell/src/styles/global.css"
    title: "CSS syntax error in global.css causes entire Vite app render to fail — all E2E tests fail with 'element not found'"
    problem: "E2E tests failed at beforeEach with 'locator(.chat-panel) not found' even though config and mock were correct. All 13 tests failed."
    root_cause: "A CSS editing mistake left an extra orphaned `color:` property and `}` outside any rule at global.css:5117–5118. PostCSS threw 'Unexpected }' parse error, Vite showed the error overlay and never mounted React."
    fix: "Removed the orphaned lines. Always verify CSS compiles successfully after editing global.css — check browser devtools or Vite server response for '[plugin:vite:css]' errors before running E2E."

  - id: L015
    date: "2026-03-21"
    issue: "#99"
    category: e2e
    scope: "shell/e2e/*.spec.ts"
    title: "Playwright strict mode: [data-panel-id] attribute on both wrapper div and button — use button[data-panel-id]"
    problem: "Locator '[data-panel-id=\"workspace\"]' resolved to 2 elements: the wrapper div AND the button inside it. Playwright strict mode threw 'strict mode violation' and the test failed."
    root_cause: "ModeBar renders a wrapper div with data-panel-id for styling, and the inner button also has data-panel-id for accessibility/testing. Using a generic attribute selector matches both."
    fix: "Use 'button[data-panel-id=\"workspace\"]' to target only the interactive button element."

  - id: L016
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/panels/workspace/FileTree.tsx, shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "Circular import between FileTree and WorkspaceCenterPanel — inline shared type to break cycle"
    problem: "FileTree imported ClassifiedDir type from WorkspaceCenterPanel, while WorkspaceCenterPanel imported FileTree. TypeScript/bundler resolved it but caused potential issues."
    root_cause: "Both components needed the same ClassifiedDir interface. Defining it in WorkspaceCenterPanel (the parent) and importing in FileTree (the child) created a circular dependency."
    fix: "Define the inline type directly in FileTree props: Array<{name: string; path: string; category: string}>. WorkspaceCenterPanel re-exports its own ClassifiedDir interface separately for the Naia tool handler."

  - id: L017
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "idleToastTimerRef must be cleared in interval useEffect cleanup to prevent setState on unmounted component"
    problem: "The idle notification setInterval creates a toast timer (setTimeout) when idle sessions are detected. The interval cleanup correctly called clearInterval, but not clearTimeout on the pending toast timer."
    root_cause: "The toast timer runs 6s after an idle alert. If the component unmounts (tab switch) while the timer is pending, setIdleToast(null) would be called on an unmounted component."
    fix: "In the interval cleanup function, also call: if (idleToastTimerRef.current) clearTimeout(idleToastTimerRef.current)."

  - id: L018
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/App.tsx"
    title: "Keep-alive panels must use display:contents (not display:block) to preserve flex layout context"
    problem: "Workspace panel was unmounting on tab switch, losing all state. Wrapping in display:none div with display:block when active broke the flex child layout — children didn't stretch correctly."
    root_cause: "The content-panel uses display:flex. A wrapper div with display:block breaks flex child behavior. display:contents makes the wrapper transparent to layout, so children participate in the parent flex context directly."
    fix: "Use style={{ display: activePanel === 'workspace' ? 'contents' : 'none' }} on the keep-alive wrapper div."

  - id: L019
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/panels/workspace/Editor.tsx"
    title: "viewMode enum is necessary for markdown 3-state view: preview / split / editor"
    problem: "previewMode boolean couldn't represent split view (editor+preview side by side). Attempting to add split with boolean state required two booleans with complex interaction."
    root_cause: "Design evolved beyond toggle: markdown needs preview-default, split (live edit), and editor-only. Three mutually exclusive states require a union type."
    fix: "type ViewMode = 'editor' | 'preview' | 'split'. Reset in useEffect([filePath]) to isMd ? 'preview' : 'editor'. CM setup skips when viewMode === 'preview'. updateListener calls setContent(text) for live preview sync in split mode."

  - id: L020
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/panels/workspace/Editor.tsx"
    title: "CodeMirror updateListener must call setContent for live split-view preview; justLoadedRef guards initial sync"
    problem: "In split mode, typing in CodeMirror didn't update the ReactMarkdown preview because content state was only set on file load, not on CM edits."
    root_cause: "CM updateListener was responsible only for autosave debounce. Adding setContent(text) to updateListener enables live preview. justLoadedRef prevents triggering autosave/setContent on the initial file load dispatch."
    fix: "In updateListener: if justLoadedRef.current is true, set to false and return early. Otherwise call setContent(text) before autosave debounce."

  - id: L021
    date: "2026-03-21"
    issue: "#99"
    category: ui
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "Drag-resize panel handles: use pointermove/pointerup on window (not mouse events)"
    problem: "Mouse-based resize using mousemove can lose tracking if cursor moves faster than panel resizes. Using pointer events with setPointerCapture is more reliable, but attaching to window also works."
    root_cause: "Pointer events work across all input types (mouse, touch, pen). Attaching to window ensures move/up are caught even if cursor leaves the handle element during fast drag."
    fix: "In onPointerDown: add document.body.classList.add('resizing-col'), then window.addEventListener('pointermove', onMove) and window.addEventListener('pointerup', onUp). Remove both in onUp."

  - id: L022
    date: "2026-03-21"
    issue: "#99"
    category: tauri
    scope: "shell/src/panels/browser/*, shell/src-tauri/src/browser.rs"
    title: "X11 XReparentWindow native windows ignore CSS opacity — cannot use CSS keep-alive"
    problem: "Browser panel was included in React keep-alive (position:absolute, opacity:0/1). CSS opacity had no effect on the Chrome X11 window — it remained fully visible even when opacity:0, overlaying the workspace panel."
    root_cause: "XReparentWindow embeds Chrome as a native OS child window. These are composited at the OS level, independent of the WebKit compositor. CSS z-index/opacity/visibility have no effect on native X11 windows."
    fix: "Added keepAlive?: boolean to PanelDescriptor. Browser panel sets keepAlive: false — it unmounts on deactivation (triggering browser_embed_close). Proper fix tracked in #102: add browser_embed_hide/show Rust commands using XUnmapWindow/XMapWindow."

  - id: L023
    date: "2026-03-21"
    issue: "#99"
    category: react
    scope: "shell/src/panels/workspace/SessionDashboard.tsx"
    title: "onSessionsUpdate callback must be called in catch block too — otherwise parent initialized state stays false"
    problem: "WorkspaceCenterPanel showed loading spinner forever when workspace_get_sessions invoke failed. initialized state was set via onSessionsUpdate callback, which was only called in the try-success path."
    root_cause: "SessionDashboard.loadSessions called onSessionsUpdateRef.current?.(result) only on success. On error, finally block set loading:false but never called onSessionsUpdate — WorkspaceCenterPanel.initialized remained false."
    fix: "Added onSessionsUpdateRef.current?.([]) in the catch block, before finally. Empty array signals 'no sessions' to parent and triggers initialized:true."

  - id: L024
    date: "2026-03-21"
    issue: "#99"
    category: ui
    scope: "shell/src/styles/global.css"
    title: "Panel CSS must use semantic tokens — define per theme, never hardcode colors"
    problem: "Workspace panel CSS used var(--bg-base, #1a1a1a) etc. with dark fallbacks. Since these tokens weren't defined in any theme, the panel always rendered dark regardless of the active theme."
    root_cause: "Semantic tokens (--bg-base, --text-primary, --border-color, --accent, --hover-bg, etc.) were used in panel CSS but never defined in the theme blocks — only raw theme variables like --espresso, --cream were defined."
    fix: "Added semantic token section to every theme (espresso/midnight/ocean/forest/rose/latte/sakura/cloud). Each maps --bg-base → var(--espresso-dark), --text-primary → var(--cream), etc. Documented as PANEL CSS STANDARD comment in global.css."

  - id: L025
    date: "2026-03-21"
    issue: "#91"
    category: api
    scope: "issue-desk/src/github/notifications.ts"
    title: "GitHub Notifications API subject.url is null for RepositoryVulnerabilityAlert — always null-check"
    problem: "GitHub API returns null for subject.url on RepositoryVulnerabilityAlert notification type. Direct string interpolation crashed at runtime."
    root_cause: "GitHub API spec allows subject.url to be null for certain notification types (RepositoryVulnerabilityAlert). No null guard in the URL conversion helper."
    fix: "Added null-check in subjectHtmlUrl(): if apiUrl is null and type is RepositoryVulnerabilityAlert, return repoHtmlUrl + '/security/dependabot'. Generic fallback returns repoHtmlUrl for other null cases."

  - id: L026
    date: "2026-03-21"
    issue: "#91"
    category: ui
    scope: "issue-desk/src/components/NotificationList.tsx"
    title: "markRead optimistic update must be inside try block — revert on failure not implemented"
    problem: "Optimistic UI update (marking notification as read before API response) was applied regardless of API success. On failure, stale read state persisted in UI."
    root_cause: "UI state update was placed before try/catch. The API call could fail silently while the UI showed the item as read."
    fix: "Moved setNotifications() call inside the try block, after await markRead() succeeds. On catch, the notification remains unread in state. Console.error logs the failure without crashing."

  - id: L027
    date: "2026-03-21"
    issue: "#91"
    category: react
    scope: "issue-desk/src/components/Settings.tsx, issue-desk/src/store/community.ts"
    title: "Renaming a keyed record requires delete+upsert, not just upsert — Zustand persist array pattern"
    problem: "Editing a community profile repo name (the key) and saving with upsertProfile left the old-key entry in the persisted array. Both old and new entries coexisted."
    root_cause: "upsertProfile matches by repo field. If repo changes, findIndex returns -1, so it appends instead of replacing. The old entry is never removed."
    fix: "On save: if editingOriginalRepo !== editingProfile.repo, call deleteProfile(editingOriginalRepo) first, then upsertProfile(editingProfile). This ensures old key is removed before inserting the renamed entry."

  - id: L028
    date: "2026-03-22"
    issue: "#116"
    category: e2e
    scope: "shell/e2e/*.spec.ts"
    title: "plugin:store|get must return [value, exists] tuple in E2E Tauri mock — null crashes Store.get()"
    problem: "E2E deeplink tests (D1/D2) failed because @tauri-apps/plugin-store's Store.get(key) destructures [value, exists] from invoke('plugin:store|get') result. Mock returned null → TypeError: Cannot destructure property '0' of null."
    root_cause: "Store API contract: invoke('plugin:store|get') always returns a [value, exists] tuple. invoke('plugin:store|load') returns a Resource ID integer (not null). Mock was returning null for both, breaking destructuring."
    fix: "if (cmd === 'plugin:store|load') return 1; if (cmd === 'plugin:store|get') return [null, false];"

  - id: L029
    date: "2026-03-22"
    issue: "#116"
    category: e2e
    scope: "shell/e2e/*.spec.ts"
    title: "keepAlive panels: Playwright toBeVisible() ignores parent opacity:0 — use slot--active selector"
    problem: "E2E test asserted '.workspace-panel' not.toBeVisible() before deeplink click, but it was already visible. keepAlive panels are always mounted. Parent .content-panel__slot uses opacity:0 (not display:none) for inactive panels."
    root_cause: "Playwright's toBeVisible() checks the element's own CSS (display, visibility, opacity) but NOT ancestor opacity. opacity:0 on a parent does not make the child 'not visible' to Playwright."
    fix: "Use '.content-panel__slot--active .workspace-panel' selector: active slot has opacity:1, and the selector doesn't match at all when panel is inactive — so not.toBeVisible() passes when panel is not the active one."

  - id: L030
    date: "2026-03-22"
    issue: "#116"
    category: regex
    scope: "shell/src/components/ChatPanel.tsx"
    title: "FILE_PATH_RE must use (?<![/\\w]) lookbehind to prevent sub-path false positives"
    problem: "Regex /(\\/[\\w\\-\\.\\/]+\\.ext)/ extracted '/src/App.tsx' from 'shell/src/App.tsx' because the leading '/' was matched as an absolute path separator. Relative paths produce clickable deeplink buttons for their sub-paths."
    root_cause: "No lookbehind check. Any '/' in a string was a valid path start, including those preceded by path segment characters."
    fix: "Added (?<![/\\w]) lookbehind: if the char before '/' is a word character or another '/', the match is blocked. Also tsx/jsx must be listed before ts/js for longest-match extension resolution."

  - id: L031
    date: "2026-03-23"
    issue: "#119"
    category: react
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "openDirsRef add-before-await pattern for async dedup in concurrent tool calls"
    problem: "Concurrent skill_workspace_new_session calls for the same dir spawned duplicate PTY processes. setTerminals-based dedup had a race: React state had not yet committed when the second call checked terminalsRef."
    root_cause: "React state updates (setTerminals) are async — terminalsRef.current is only updated during the render body, not when setTerminals() is called. A second tool call arriving during await pty_create could bypass the state-based dedup check."
    fix: "Use a separate useRef Set (openDirsRef) as the dedup source of truth. Add the dir BEFORE await pty_create (blocks concurrent calls immediately). Delete only on failure (catch) or tab close — NOT on success (the entry stays until the tab is closed)."

  - id: L032
    date: "2026-03-23"
    issue: "#119"
    category: react
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "terminalsRef.current updates on render, not on setTerminals — safe to read in callbacks"
    problem: "Reviewers flagged handleCloseTerminal as having a race condition: 'terminalsRef might not find the tab if setTerminals already queued a filter'. This caused confusion about whether the find() was safe."
    root_cause: "terminalsRef.current = terminals runs in the render body (synchronously during React render). It is NOT updated when setTerminals() is called. Between a setTerminals() call and the next render, terminalsRef.current still holds the previous array."
    fix: "No code change needed — the pattern is correct. Add a comment: 'terminalsRef.current is updated synchronously in the render body, NOT on setTerminals(). So even if another handler already queued a setTerminals(), terminalsRef still holds the current (pre-render) tabs here — find() is safe.'"

  - id: L033
    date: "2026-03-23"
    issue: "#119"
    category: frontend
    scope: "shell/src/panels/workspace/Terminal.tsx"
    title: "xterm.js keepAlive: use opacity:0+pointerEvents:none, never display:none"
    problem: "Terminal component needed keepAlive stacking (multiple PTY instances, one active at a time). display:none was considered but breaks FitAddon."
    root_cause: "FitAddon.fit() computes terminal dimensions from the container's offsetWidth/offsetHeight. When display:none is applied, these values are 0 — fit() returns 0×0 cols/rows, and the PTY gets resized to an invalid size."
    fix: "Use CSS position:absolute; inset:0 on all terminal containers (stacked). Hide inactive terminals via inline opacity:0; pointerEvents:none. The ResizeObserver callback guards against 0×0 with 'if (!rows || !cols) return' before calling pty_resize."

  - id: L034
    date: "2026-03-23"
    issue: "#102"
    category: frontend
    scope: "shell/src/panels/browser/*, shell/src/stores/panel.ts"
    title: "X11 native embed keepAlive: use IPC XUnmapWindow/XMapWindow, not CSS opacity — completes L022"
    problem: "L022 noted CSS opacity has no effect on X11 native windows and set keepAlive:false as a workaround (unmount/remount = Chrome restart on each tab switch = slow, blank screen)."
    root_cause: "X11 native child windows are composited at OS level; WebKit compositor has no authority over them. Unmounting React component causes browser_embed_close (Chrome restart) on next activation."
    fix: "Set keepAlive:true on browser panel. Rust adds browser_embed_hide (XUnmapWindow) and browser_embed_show (XMapWindow). panel.ts setActivePanel calls these IPC commands. Chrome stays alive across tab switches — no restart, no blank screen."

  - id: L035
    date: "2026-03-23"
    issue: "#102"
    category: react
    scope: "shell/src/stores/chat.ts, shell/src/components/ChatPanel.tsx"
    title: "Store action invoke-before-set pattern: invoke must be called BEFORE set() to guarantee modal ordering"
    problem: "PermissionModal appeared but was hidden behind the Chrome X11 window for 1 frame. ChatPanel useEffect called browser_embed_hide after React re-render, so Chrome was visible during the render where the modal appeared."
    root_cause: "useEffect fires AFTER React commits to DOM (post-paint). In that window, the native Chrome window remained visible over the freshly-rendered modal."
    fix: "Move invoke('browser_embed_hide') into setPendingApproval store action, BEFORE set({pendingApproval}). Store actions execute synchronously; the invoke is dispatched before React sees the state change. useEffect approach is 1 frame too late for native window ordering."

  - id: L036
    date: "2026-03-23"
    issue: "#102"
    category: react
    scope: "shell/src/stores/chat.ts"
    title: "All pendingApproval-clearing paths must be symmetric with setPendingApproval hide — clearPendingApproval, finishStreaming, newConversation"
    problem: "After adding browser_embed_hide to setPendingApproval, Chrome remained permanently hidden when approval was cleared via finishStreaming or newConversation. These paths set pendingApproval:null without calling browser_embed_show."
    root_cause: "Only clearPendingApproval was written as the 'mirror' of setPendingApproval. finishStreaming and newConversation used set() directly, bypassing the show guard."
    fix: "Every path that sets pendingApproval:null must have the guard: 'if (get().pendingApproval && usePanelStore.getState().activePanel === \"browser\") invoke(\"browser_embed_show\")'. Three paths: clearPendingApproval, finishStreaming (before set()), newConversation (before set()). Also add get().pendingApproval guard to clearPendingApproval — prevents show() when there was no prior hide()."

  - id: L037
    date: "2026-03-23"
    issue: "#102"
    category: e2e
    scope: "shell/e2e/*.spec.ts"
    title: "E2E Tauri mock command name must exactly match Rust invoke() call — wrong name causes silent no-op state"
    problem: "Browser panel E2E tests showed the panel stuck in 'no-chrome' state. B4/B6/B7 tests failed. browser_check was mocked as browser_check_available, so mock returned undefined (not true). Panel status guard never reached 'ready'."
    root_cause: "Tauri mock intercepts by exact string match. When the command name in the mock differs from the actual Rust command, the mock falls through to 'return undefined'. For browser_check, undefined is falsy — panel state machine branched to 'no-chrome' path."
    fix: "Always grep the actual Rust invoke name (shell/src-tauri/src/*.rs invoke! macro or shell TS files) before writing mock entries. Use 'browser_check', not 'browser_check_available'. Verify mock by checking that the panel reaches expected status before making behavioral assertions."

  - id: L038
    date: "2026-03-23"
    issue: "#98"
    category: security
    scope: "shell/src/lib/naia-bridge-client.ts"
    title: "window.parent.origin throws SecurityError in cross-origin iframe — use '*' with server-side origin validation"
    problem: "naia-bridge-client.ts used window.parent.postMessage(req, window.parent.origin). In Tauri, iframe (http://asset.localhost) and Shell (tauri://localhost) are cross-origin, so accessing window.parent.origin throws SecurityError."
    root_cause: "Cross-origin iframe spec: accessing parent.origin from a child of a different origin throws SecurityError. This is a browser security restriction, not a Tauri-specific issue."
    fix: "Use window.parent.postMessage(req, '*'). Safe because iframe-bridge.ts validates event.origin === 'http://asset.localhost' on the receiving end. Document in comment."

  - id: L039
    date: "2026-03-23"
    issue: "#98"
    category: testing
    scope: "shell/src/lib/__tests__/iframe-bridge.test.ts"
    title: "jsdom postMessage with targetOrigin mismatch is silently dropped — spy on source.postMessage to capture bridge responses"
    problem: "iframe-bridge.ts sends respond() via postMessage(data, 'http://asset.localhost'). In jsdom, a postMessage with specific targetOrigin is dropped if the receiver window's origin doesn't match. Test tried to listen for the response via addEventListener('message') but never received it."
    root_cause: "jsdom enforces targetOrigin matching for postMessage. When the bridge responds to ALLOWED_ORIGIN and the test window's origin is 'null' (jsdom default), the message is silently dropped."
    fix: "Use vi.spyOn(source, 'postMessage') before dispatching the test message. After await setTimeout(30), check spy.mock.calls to find the response by id. This intercepts the call before jsdom targetOrigin filtering."

  - id: L040
    date: "2026-03-23"
    issue: "#98"
    category: security
    scope: "shell/src-tauri/src/panel.rs"
    title: "remove_dir_all without canonicalize allows symlink attack on panel removal"
    problem: "panel_remove_installed validated panelId for '/', '\\', '..' but called remove_dir_all(&panel_dir) directly. If ~/.naia/panels/{id} was a symlink to a directory outside HOME, remove_dir_all would follow the symlink and delete the target's contents."
    root_cause: "String validation on panelId only prevents path traversal in the segment name — it doesn't prevent the directory itself from being a symlink to an external path."
    fix: "After panel_dir.exists(), call panel_dir.canonicalize() and verify canonical path starts_with(home_path) before calling remove_dir_all(&canonical). Mirrors panel_read_file's boundary check pattern."

  - id: L041
    date: "2026-03-23"
    issue: "#107"
    category: rust
    scope: "shell/src-tauri/src/workspace.rs"
    title: "OnceLock<Mutex<String>> initial value must be the compile-time fallback, not String::new()"
    problem: "OnceLock::get_or_init(|| Mutex::new(String::new())) initializes the Mutex with an empty string. Any thread calling get_workspace_root() between OnceLock initialization and the first workspace_set_root call sees an empty string instead of the fallback root."
    root_cause: "String::new() was chosen for ergonomics. But the initial value is the first observable value for any reader arriving before workspace_set_root runs — an empty string silently produces wrong behavior (empty scan root, missing sessions)."
    fix: "Use WORKSPACE_ROOT.to_string() as the initial value: get_or_init(|| Mutex::new(WORKSPACE_ROOT.to_string())). This matches the compile-time fallback semantics and eliminates the race window."

  - id: L042
    date: "2026-03-23"
    issue: "#107"
    category: react
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "workspaceReady gate: React child effects can fire before parent IPC completes"
    problem: "SessionDashboard's workspace_get_sessions useEffect fired before WorkspaceCenterPanel's workspace_set_root invoke completed. Sessions were scanned from the wrong (stale hardcoded) root."
    root_cause: "React's useEffect runs children effects before parent effects in some mount orderings. Without a gate, SessionDashboard mounted and triggered its load before workspace_set_root resolved."
    fix: "Add workspaceReady boolean state in parent. Only render the child component when workspaceReady === true. Set it to true inside .finally() of the workspace_set_root invoke chain. Child never mounts until IPC completes."

  - id: L043
    date: "2026-03-23"
    issue: "#107"
    category: tauri
    scope: "shell/src-tauri/src/workspace.rs, shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "Return canonical path from Tauri IPC command to keep frontend and backend in sync"
    problem: "workspace_set_root originally returned (). Frontend displayed the raw config path in empty-state messages. On Fedora, /home/luke is a symlink to /var/home/luke — the raw and canonical paths differ, causing confusing UI."
    root_cause: "Backend calls p.canonicalize() internally but discarded the result. Frontend had no way to know the actual path the backend scanned."
    fix: "Return Result<String, String> from workspace_set_root with the canonical path on success. Frontend: .then(canonical => setResolvedRoot(canonical)).catch(() => setResolvedRoot(WORKSPACE_ROOT)).finally(() => setWorkspaceReady(true)). Pass resolvedRoot (not raw config value) to all child components."

  - id: L044
    date: "2026-03-23"
    issue: "#120"
    category: react
    scope: "shell/src/components/ChatPanel.tsx"
    title: "panel_tool_call routing: per-panel bridge factory breaks activeBridge singleton dispatch"
    problem: "After commit 916a657 introduced getBridgeForPanel() factory (per-panel bridge instances), App.tsx passed getBridgeForPanel(panel.id) to each panel but ChatPanel still called activeBridge.callTool(). These are different ActivePanelBridge instances with separate handlers Maps — workspace tool calls silently returned 'No handler registered'."
    root_cause: "The 916a657 commit updated App.tsx to use per-panel bridges for isolation, but did not update ChatPanel's panel_tool_call handler to route to the owning panel's bridge. The singleton activeBridge still had the old handlers (none registered after the migration)."
    fix: "In panel_tool_call handler: const ownerPanel = panelRegistry.list().find(p => p.tools?.some(t => t.name === chunk.toolName)); const bridge = ownerPanel ? getBridgeForPanel(ownerPanel.id) : activeBridge; bridge.callTool(...)"

  - id: L045
    date: "2026-03-23"
    issue: "#120"
    category: react
    scope: "shell/src/components/ChatPanel.tsx"
    title: "messageQueue stale closure: setInput(next) + setTimeout(() => handleSend()) uses pre-render handleSend"
    problem: "Queue processing useEffect called setInput(next) then setTimeout(() => handleSend(), 50). The setTimeout captured handleSend from the current render (where input = ''). Even after setInput(next) triggered a re-render, the setTimeout still held the OLD handleSend closure with input = ''. handleSend() resolved text = '' and returned early — message never sent."
    root_cause: "React functional component: every render creates a new handleSend closure. useEffect captures handleSend at the time the effect runs. setInput(next) schedules a NEW render but cannot retroactively update the already-captured closure in setTimeout."
    fix: "Pass the queued message directly: handleSend(next). This uses overrideText instead of the input state closure, eliminating the stale-closure dependency entirely. Also removed the setInput(next) call since handleSend already calls setInput('')."

  - id: L046
    date: "2026-03-23"
    issue: "#121"
    category: rust
    scope: "shell/src-tauri/src/workspace.rs"
    title: "Rust path canonicalization consistency: path_str must use std::fs::canonicalize throughout workspace.rs"
    problem: "workspace_get_sessions and workspace_classify_dirs constructed path_str via path.to_string_lossy() (non-canonical), while get_main_worktree returned canon_main.to_string_lossy() (canonical via std::fs::canonicalize). On Fedora/Bazzite with /home → /var/home symlink, groupBy key in TypeScript (origin_path ?? path) would mismatch — main worktree 'path' = /home/luke/dev/naia-os vs linked worktree 'origin_path' = /var/home/luke/dev/naia-os. Also affected last_change/branch_cache lookup misses in the file-change watcher callback."
    root_cause: "canonical_workspace_root() was already canonical but path_str for each entry was formed from entry.path() without canonicalize. The inconsistency was invisible in non-symlink environments."
    fix: "Replace path.to_string_lossy() with std::fs::canonicalize(&path).map(|p| p.to_string_lossy().to_string()).unwrap_or_else(|_| path.to_string_lossy().to_string()) in workspace_get_sessions and workspace_classify_dirs. Also canonicalize wt_path in get_all_worktree_paths."

  - id: L047
    date: "2026-03-23"
    issue: "#121"
    category: rust
    scope: "shell/src-tauri/src/workspace.rs"
    title: "WatcherState cache completeness: new cache fields must be added to stop_watch clear block"
    problem: "origin_path_cache was added to WatcherState and used in workspace_get_sessions, but workspace_stop_watch only cleared last_change, recent_files, and branch_cache. Missing clear meant stale origin_path data persisted after stop→start (e.g. after git worktree remove)."
    root_cause: "workspace_stop_watch manually enumerates cache Arcs — new fields require explicit addition. No compile-time enforcement."
    fix: "Add origin_path_cache_arc to the stop_watch Arc clone block and call .lock().unwrap().clear(). Rule: any new Arc<Mutex<HashMap>> field in WatcherState must be added to both workspace_get_sessions clone block AND workspace_stop_watch clear block."

  - id: L048
    date: "2026-03-23"
    issue: "#91"
    category: react
    scope: "issue-desk/src/components/TriageView.tsx"
    title: "Zustand store value in useEffect deps causes infinite loop when effect writes to the same key — use getState() instead"
    problem: "TriageView orphan-cleanup useEffect listed triageBuckets as a dependency. The effect reads triageBuckets to find orphan entries and then calls setTriageBuckets to remove them. This modification triggers a re-render, which re-runs the effect, creating an infinite loop."
    root_cause: "React useEffect runs whenever any listed dependency changes. If the effect itself mutates a dep (even indirectly via a store action), the effect oscillates until React's infinite-loop guard fires."
    fix: "Inside the useEffect body, read the value via useWorkflowStore.getState().triageBuckets instead of the destructured reactive triageBuckets. This accesses the store directly without subscribing as a dependency, breaking the loop. Pattern: use getState() for read-only side-effect access when the dep would cause oscillation."

  - id: L049
    date: "2026-03-23"
    issue: "#91"
    category: react
    scope: "issue-desk/src/components/IssueCard.tsx"
    title: "Compute date-derived values once per render — avoid calling daysSince()/Date.now() multiple times for the same field"
    problem: "IssueCard needed both the stale boolean and the raw staleDays count (for the tooltip title). Calling isStale(issue.updated_at) for the boolean and then daysSince(issue.updated_at) for the count calls Date.now() twice with a tiny time gap, meaning the rendered tooltip title could disagree with the badge condition at a 30-day boundary."
    root_cause: "isStale() and daysSince() each call Date.now() internally. In the same render, two calls to Date.now() return values that differ by microseconds but can differ by 1 day at an exact boundary."
    fix: "Compute const staleDays = daysSince(issue.updated_at); then derive const stale = staleDays >= 30;. Reuse both in JSX. This guarantees logical consistency and avoids the double-sampling problem."

  - id: L050
    date: "2026-03-24"
    issue: "#114"
    category: react
    scope: "shell/src/panels/workspace/WorkspaceCenterPanel.tsx"
    title: "Re-arm notification Set on recovery — error → active/idle must delete from notifiedRef"
    problem: "errorNotifiedRef tracks sessions that already received error notifications. When a session recovered (active/idle) and then errored again, the Set still contained the path — so the second error was silently swallowed."
    root_cause: "The Set was only added to (on error) and cleared (on sessionId null). Recovery transitions were not handled, breaking the 'fire once per session per error bout' contract."
    fix: "In the active/idle branch of handleSessionsUpdate, call errorNotifiedRef.current.delete(s.path) alongside idleNotifiedRef.current.delete(s.path). Symmetric with the idleNotifiedRef re-arm pattern. Rule: any notifiedRef that gates on session status must be re-armed on recovery, not only cleared on conversation reset."

  - id: L052
    date: "2026-03-24"
    issue: "#72"
    category: audio
    scope: "agent/src/providers/openai.ts, shell/src/lib/voice/audio-queue.ts"
    title: "vLLM omni model returns audio in choices[1], non-streaming only — AudioQueue needs WAV MIME detection"
    problem: "MiniCPM-o via vllm-omni returns text in choices[0].message.content and audio (base64 WAV) in choices[1].message.audio.data, but only in non-streaming mode. AudioQueue hardcoded audio/mp3 MIME so WAV data was unplayable."
    root_cause: "OpenAI streaming API doesn't support audio output. vllm-omni uses a custom non-streaming response format with dual choices. AudioQueue was written assuming all audio is MP3 (edge-tts output)."
    fix: "Detect isOmni (isVllm && /minicpm[-_]?o/i) and use non-streaming fetch path in openai.ts. In audio-queue.ts, detect WAV by base64 prefix 'UklGR' (RIFF header) and use audio/wav MIME. Add omniAudioReceived flag in index.ts to skip TTS synthesis when omni already sent audio."

  - id: L053
    date: "2026-03-24"
    issue: "#85"
    category: ml-infra
    scope: "vllm-omni/vllm_omni/worker/base.py"
    title: "torch_peak_increase inflated by AOT compilation artifacts — use steady-state memory for KV cache sizing"
    problem: "vllm-omni memory profiling fallback used torch_peak_increase to estimate profiled_usage, but torch.compile/AOT compilation buffers temporarily spike memory then free after compilation completes. This caused available_kv_cache_memory_bytes to be underestimated, leading to OOM or reduced batch size."
    root_cause: "after_profile.torch_memory (memory_reserved after gc+empty_cache) reflects steady state (weights + persistent buffers only). Peak captures transient compile artifacts."
    fix: "Use steady_state_torch = profile_result.after_profile.torch_memory instead of model_memory_usage + torch_peak_increase. Non-torch increase still added via max(0, non_torch_increase)."

