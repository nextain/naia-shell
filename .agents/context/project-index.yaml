  - agents: .agents/workflows/development-cycle.yaml
    users: .users/workflows/development-cycle.md
    description: Coding-level development cycle — TDD, code quality gates, security review, AI pair-programming rules

mirroring_rules:
  structure: triple-mirror
  layers:
    - path: .agents/context/
      lang: en
      format: YAML/JSON
      purpose: AI consumption (token-optimized)
    - path: .users/context/
      lang: en
      format: Markdown
      purpose: English human docs (default, open-source community)
    - path: .users/context/ko/
      lang: ko
      format: Markdown
      purpose: Korean human docs (maintainer language)
  community_translations:
    rule: "Contributors may add .users/context/{lang}/ for their language via PR"
    validation: "CI checks structural sync with English (section count, headers)"
  rules:
    - When any layer is updated, propagate to the other two
    - AI reads .agents/ for token-efficient context
    - AI reads .users/ for detailed human-level understanding
    - New document = create English version first, then mirror to ko/ and .agents/
    - README.md stays in Korean (project primary language)

docs:
  location: docs/
  structure:
    reports: "docs/reports/YYYYMMDD-<topic>.md — investigation reports, design documents, retrospectives"
    installation_guide: "docs/installation-guide/ — end-user installation guide with screenshots"
  rules:
    - "Use subdirectories by document type (reports/, guides/, etc.) — no loose files in docs/"
    - "Report filenames include date prefix: YYYYMMDD-<topic>.md"
    - "Language: English (public docs)"
  note: "docs/ is for standalone documents not suited to .agents/ or .users/ context structure"

submodules:
  alpha-memory:
    path: alpha-memory/
    repo: nextain/alpha-memory
    url: https://github.com/nextain/alpha-memory
    description: Cognitive memory architecture + benchmark suite (extracted from agent/src/memory)
    entry_points:
      - alpha-memory/README.md
      - alpha-memory/.agents/context/project-index.yaml
      - alpha-memory/.users/context/project-index.md
    context:
      agents: alpha-memory/.agents/context/
      users_en: alpha-memory/.users/context/
      users_ko: alpha-memory/.users/context/ko/
    note: Read alpha-memory/.agents/context/project-index.yaml when working on memory system or benchmarks

work_logs:
  location: work-logs/
  convention: "YYYYMMDD-NN-<topic>.md"
  note: All naia-os work logs live here (not in docs-work-logs)

on_demand_loading:
  always_read:
    - .agents/context/agents-rules.json
  read_when_needed:
    - .agents/context/philosophy.yaml (when discussing project values, principles, or licensing)
    - .agents/context/contributing.yaml (when contributing code, context, or skills)
    - .agents/context/donation.yaml (when user forks project, adapts patterns, or asks about sponsorship)
    - .agents/context/vision.yaml (when discussing direction/purpose)
    - .agents/context/plan.yaml (when planning or implementing phases)
    - .agents/context/architecture.yaml (when working on agent/gateway integration, Rust backend, or panel system — ALWAYS read before gateway/Rust/panel work)
    - .agents/context/careti-reuse.yaml (when porting code from careti)
    - .agents/context/testing.yaml (when writing or running tests)
    - .agents/context/gateway-sync.yaml (when working on Gateway sync or persona/settings)
    - .agents/context/skill-naia-discord.yaml (when working on Discord skill or messaging)
    - .agents/context/channels-discord.yaml (when working on Discord integration, OAuth, or Shell conversation sync)
    - .agents/context/distribution.yaml (when building, releasing, or deploying — Flatpak, ISO, Flathub)
    - .agents/context/update-pipeline.yaml (when working on OS updates, Bazzite sync, CI pipeline, or testing)
    - .agents/context/i18n.yaml (when working on translations, locale handling, AI response language, or multilingual features)
    - .agents/context/translating.yaml (when reviewing translation PRs, onboarding translation contributors, or updating translation status)
    - .agents/context/bazzite-rebranding.yaml (when modifying OS branding, logos, boot splash, or installer assets)
    - .agents/context/brand.yaml (when working on branding, character, logos, or color system)
    - .agents/context/demo-video.yaml (when creating, updating, or re-recording demo videos)
    - .agents/context/charter-draft.yaml (when discussing open source sustainability, AI collaboration, or community experiment)
    - .agents/context/upstream-contribution.yaml (when forking an upstream OSS project, doing landscape research, or preparing upstream PRs)
    - .agents/context/open-source-operations.yaml (when reviewing contribution workflows, community operations, or maintainer processes)
    - .agents/tests/license-protection-test.md (when testing license compliance or onboarding new AI agents)
    - .agents/tests/ai-native-onboarding-test.md (when testing AI agent onboarding behavior)
    - .agents/tests/context-update-test-methodology.md (when planning or running context quality tests)
    - .agents/workflows/issue-driven-development.yaml (when starting feature-level work — ALWAYS read at session start)
    - .agents/context/review-guide.yaml (when reviewing code, running cross-review, or evaluating any PR — ALWAYS read at review time)
    - .agents/workflows/development-cycle.yaml (when coding — ALWAYS read before building)
    - .agents/context/multi-project-workspace.yaml (when working in a multi-project workspace)
    - .agents/context/harness.yaml (when working on hooks, progress files, or harness engineering)
    - .agents/context/model-strategy.yaml (when working on model selection, fine-tuning, embedding, or hardware tier planning)
    - .agents/context/hardware-tiers.yaml (when working on GPU requirements, VRAM allocation, or memory system resource planning)
    - .agents/workflows/* (when executing specific workflows)
