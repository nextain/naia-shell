# SPDX-License-Identifier: CC-BY-SA-4.0
#
# Issue-Driven Development Cycle
#
# Upstream-first, code-centric development methodology
# for fork-based / upstream-dependent projects (e.g., Naia OS on Bazzite).
#
# Key insight: front-load user involvement (issue understanding, scope, plan),
# then AI executes autonomously with built-in quality gates.
#
# Scope: Default for all feature-level work (new features, broad bug fixes).
# For non-feature changes (typos, config values, simple directives), use development-cycle.yaml.

version: 2
name: issue-driven-development
mirror: ".users/workflows/issue-driven-development.md"

# ─── Session Resume Protocol (MANDATORY) ─────────────────────
#
# Context compaction and session restarts destroy all in-memory context.
# GitHub Issues are the ONLY persistent source of truth for ongoing work.
#
# Rule: On EVERY new session or context compaction, before ANY work:
#   1. Run: gh issue list --assignee @me --state open
#      OR: identify the issue number from the user's request
#   2. Run: gh issue view <N> (read the FULL issue body + ALL comments)
#   3. Read the progress file: .agents/progress/<N>-*.json (if exists)
#   4. ONLY THEN begin or resume work
#
# Never rely on AI memory alone. If it's not in the Issue, it doesn't exist.
#
# Issue content requirements (enforced at plan phase):
#   - Design references: file paths or image uploads for ALL UI changes
#   - Decisions: why this approach was chosen
#   - Rejected alternatives: what was tried and discarded
#   - Current phase: where we are in the 14-phase cycle
#   - Blockers: what is blocking progress
#
# Anti-pattern: "I remember the design from the previous session" → WRONG
# Correct: "Let me read gh issue view <N> to see the design reference" → RIGHT

session_resume_protocol:
  mandatory: true
  step_1: "gh issue list --state open (identify active issues)"
  step_2: "gh issue view <N> (read full body + ALL comments — not just the latest)"
  step_3: "cat .agents/progress/<N>-*.json (read progress file if exists)"
  step_4: "Only after reading issue AND progress file: resume work"
  never: "Start or resume work based on AI memory alone"
  why: "Context compaction deletes all in-memory state. Issues + progress files are the only persistent truth."

scope:
  applies_to: "Default for all feature-level work"
  includes:
    - "New feature development"
    - "Bug fixes that touch a broadly-built feature (most bugs lead to full feature review)"
    - "Any work where surrounding code quality is uncertain"
  unit: "Feature (may span multiple issues)"
  not_for: "Non-feature changes (typos, config values, simple directives) — use development-cycle.yaml"

# ─── Principles ───────────────────────────────────────────────

principles:
  upstream_analysis_first:
    rule: "Before writing code, fully understand how upstream implements the feature"
    anti_pattern: "Guessing upstream behavior without reading the code"

  minimal_modification:
    rule: "Follow upstream's working flow, overlay customizations with minimal changes"
    anti_pattern: "Rebuilding what upstream already provides"

  no_guessing:
    rule: "Never design based on assumptions — read the actual code"
    anti_pattern: "Assuming behavior from docs or naming conventions alone"

  no_symptom_patching:
    rule: "Before stacking patches, verify you're on the correct path"
    anti_pattern: "Fixing symptoms with 5 patches when 1 root-cause fix suffices"

  no_autonomous_development:
    rule: "Propose improvements to the user — never decide to build on your own"
    anti_pattern: "Deciding 'this would be better' and implementing without asking"

  working_code_preservation:
    rule: "Never break working code by 'improving' or 'switching modes'"
    anti_pattern: "Refactoring a working flow into a 'better' one that crashes"

  structural_problem_first:
    rule: "When tests fail or AI behaves unexpectedly, analyze structural issues (doc vs code mismatch, unreachable references, information architecture) before attributing to AI tool characteristics"
    anti_pattern: "Blaming 'AI reads shallow' when the real problem is a broken file reference"

  test_as_diagnostic:
    rule: "Tests are diagnostic tools — a failing test means 'investigate the bug', not 'fix the test to pass'. Read full output before any code change."
    anti_pattern: "Weakening assertions, changing expected values, or deleting test cases to make tests pass without diagnosing root cause"

# ─── Iteration Termination Rule ───────────────────────────────

iteration_rule:
  description: "All loops in this workflow terminate only after TWO consecutive clean passes"
  rationale: "A single clean pass can be a false negative. Two consecutive clean passes reduce the risk of missed issues."
  applies_to: ["plan", "review", "post_test_review", "sync_verify"]

# ─── Phases ───────────────────────────────────────────────────

phases:

  # ── User-Involved (front-loaded) ──────────────────────────

  issue:
    description: "Define or receive the issue"
    steps:
      - "Identify or create a GitHub Issue"
      - "All subsequent artifacts link back to this Issue"
    output: "GitHub Issue URL"

  understand:
    description: "Confirm understanding of the issue before investigating"
    gate: true  # must not proceed without user confirmation
    steps:
      - "Analyze the issue and summarize understanding"
      - "Present to user: 'Is my understanding correct?'"
      - "User confirms or corrects"
    output: "Confirmed issue understanding"
    record: "Post understanding summary as Issue comment (English)"

  scope:
    description: "Define investigation scope and depth, with user approval"
    gate: true  # must not proceed without user confirmation
    steps:
      - "Propose scope (which files/modules/repos to examine)"
      - "Propose depth for each scope area"
      - "Present to user with rationale"
      - "User confirms or adjusts"
    output: "Confirmed scope and depth"
    record: "Post scope definition as Issue comment (English)"

    scope_levels:
      L1: "Files to be directly modified"
      L2: "Dependencies of L1 (imports, callers, callees)"
      L3: "Upstream originals (how the same feature is implemented upstream)"

    depth_levels:
      surface: "Function signatures, config values, interfaces only"
      flow: "Execution flow tracing (call chains, ordering)"
      internal: "Line-by-line implementation logic"

  investigate:
    description: "Code-centric investigation within confirmed scope"
    steps:
      - "loop:"
      - "  - Read ALL code in scope (not just until first finding)"
      - "  - List findings with evidence (file:line citations required)"
      - "  - Re-read scope for additional findings"
      - "  - If new findings → continue loop"
      - "  - If TWO consecutive passes find nothing new → investigation complete"
      - "When an approach is tried and discarded → append to progress.rejected_alternatives[]"
      - "When a platform/library constraint is found → append to progress.constraints_discovered[]"
    rules:
      - "NEVER stop at the first bug found — complete full scope review"
      - "Every finding MUST cite specific code location (file:line)"
      - "No 'it seems like...' — only evidence-backed findings"
      - "Code over docs — read actual implementation, not just documentation"
      - "Distinguish CI/dummy code from production code"
    output: "Complete findings list with evidence"
    record: "Post investigation results as Issue comment (English)"

  research_artifact:
    description: "Distill investigation findings into a structured research summary and post as Issue comment"
    skip_when: "Issue is classified as lightweight (non-feature change) OR scope is L1-only with no cross-module data flow"
    steps:
      - "Synthesize investigate findings into: target code areas, cross-module data flow, reference implementations found"
      - "Include specific file:line citations for every claim"
      - "Post as Issue comment under heading '## Research Findings' (English)"
    rules:
      - "No implementation code in this phase — analysis only"
      - "Every claim must cite file:line evidence from investigate phase"
    output: "GitHub Issue comment '## Research Findings' with structured analysis"
    record: "Post research findings as Issue comment (English)"

  annotation_cycle:
    description: "Present research + draft plan to user for inline correction before implementation begins"
    skip_when: "Issue is classified as lightweight OR scope is L1-only with no cross-module data flow"
    gate: false  # not a hard gate — user-driven iteration
    max_iterations: 3
    steps:
      - "Present research findings and draft plan to user"
      - "User adds inline corrections or annotations"
      - "If corrections present: revise plan only — do NOT write implementation code"
      - "Track iteration: 'Annotation cycle N/3'"
      - "Repeat until user approves or max_iterations reached"
    rules:
      - "NEVER write implementation code during annotation cycle"
      - "Address ALL user annotations before presenting the next revision"
      - "If max_iterations reached without approval: escalate to user with explicit choices"
    output: "User-approved draft plan (feeds into plan phase)"

  plan:
    description: "Comprehensive plan based on ALL findings"
    gate: true  # must not proceed without user confirmation
    steps:
      - "Draft plan addressing all findings (not just the first one)"
      - "Split phases by testable boundaries — each phase must have a verification method"
      - "loop:"
      - "  - Re-read plan against findings and actual code"
      - "  - Check for missing items, inconsistencies, unverified references"
      - "  - If corrections needed → update plan, continue loop"
      - "  - If TWO consecutive passes find nothing to fix → plan is stable"
      - "Present stable plan to user for approval"
      - "User confirms or adjusts"
    rules:
      - "Each phase MUST define its verification method (build check, unit test, E2E, manual, file review)"
      - "If a phase cannot be tested locally, note it explicitly and state what CAN be verified"
      - "Never group untestable and testable work in the same phase"
    output: "Approved implementation plan with per-phase verification methods"
    record: "Post plan as Issue comment (English) using structured template:"
    comment_template: |
      ## Decision
      [Adopted approach and why — distilled from plan]

      ## Rejected
      [Populate from progress.rejected_alternatives[] — one line per entry: `- {approach} — {reason}`]

      ## Constraints
      [Populate from progress.constraints_discovered[] — one line per entry: `- {constraint} ({scope})`]

      ## Directives (for future AI sessions)
      [Forward-looking warnings for the next session working on this code]

  # ── AI-Autonomous (with quality gates) ────────────────────

  build:
    description: "Implement according to approved plan"
    steps:
      - "Set up workspace (see git_integration.isolation for worktree vs branch)"
      - "Implement changes per plan, one phase at a time"
      - "After each phase:"
      - "  1. Run iterative code review (TWO consecutive clean passes)"
      - "  2. Run defined verification method (test/build check)"
      - "  3. Do NOT proceed to next phase until both are clean"
      - "After ALL phases complete:"
      - "  - Run full iterative code review across all changes (TWO consecutive clean passes)"
      - "Follow TDD where applicable (RED → GREEN → REFACTOR)"
    rules:
      - "Stay within plan scope — no unplanned changes"
      - "Follow upstream patterns, don't invent new ones"
      - "Do NOT proceed to the next phase if review or verification fails"
    output: "Implementation on worktree or branch (verified per-phase + full review)"

  review:
    description: "Self-review against plan AND original issue"
    trigger: "After EVERY phase completion (not just at the end)"
    skill: "/review — use this slash command for structured iterative review (reads files, records evidence)"
    steps:
      - "loop:"
      - "  - Read ALL new/modified files (not from memory — re-read with Read/Grep/Glob)"
      - "  - Review code against checklist"
      - "  - Fix any issues found"
      - "  - Re-review (read again after fixes)"
      - "  - If TWO consecutive passes find no issues → review complete"
      - "Multi-phase builds: run review after each phase before proceeding"
      - "Run '/verify-implementation' to check all registered verify-* rules against new/modified code"
    evidence: "Record each pass in progress file review_evidence[] (pass, files_read, issues_found, date)"
    enforcement: "process-guard hook blocks any 'clean pass' / '수정 없음' declaration without Read/Grep/Glob in the same response"
    output: "Clean, reviewed code"

    checklist:
      - "plan_compliance: Does the code implement every item in the plan?"
      - "issue_resolution: Does it actually solve the original issue?"
      - "scope_discipline: Are there changes beyond what was planned?"
      - "working_code_preserved: Does it break anything that was working?"
      - "upstream_pattern: Does it follow upstream conventions, not invent new ones?"
      - "side_effects: Could this change affect other parts unexpectedly?"
      - "hardcoded_strings: Are there any hardcoded UI strings that should use i18n?"
      - "type_safety: Are there any unvalidated external inputs (body, params)?"
      - "unused_code: Are there unused props, imports, or dead code paths?"
      - "debug_logging_sufficient: Do new code paths have adequate debug logging (async ops, state transitions, external calls, error paths)?"

  e2e_test:
    description: "End-to-end test by running the actual application"
    steps:
      - "Start the actual dev server / application (not a mock or stub)"
      - "Run ONLY the tests covering changed code first (targeted test)"
      - "After targeted tests pass, run the full E2E suite"
      - "Test through the real UI/Shell path as a real user would"
      - "Tests must pass completely clean (no partial passes)"
    rules:
      - "MUST actually run the web server or application — never just check integration flow"
      - "Test data comes from .env files — if required env vars are missing, ask user before proceeding"
      - "No runtime patches to make tests pass"
      - "No manual post-processing"
      - "User's goal must be achieved without additional intervention"
    execution_order:
      - "1. Check .env for required test data (API keys, tokens, URLs)"
      - "2. If .env vars missing → ask user to provide them"
      - "3. Start dev server / app"
      - "4. Run targeted tests (changed scope only) for fast feedback"
      - "5. On pass → run full E2E suite"
      - "6. On fail → diagnose (read full output), fix root cause, re-run targeted tests"
    on_failure:
      mandatory_first_step: "DIAGNOSE — read full test output before any code change"
      diagnose:
        - "Read FULL test output (error message, stack trace, actual vs expected values)"
        - "Read relevant test code to confirm assertions are correct"
        - "Identify root cause: is it implementation, design, or investigation gap?"
        - "Record diagnosis in progress file (test_findings field)"
      then_route:
        implementation_issue: "→ return to BUILD (with specific diagnosis of what to fix)"
        design_issue: "→ return to PLAN (with specific diagnosis of design flaw)"
        investigation_gap: "→ return to INVESTIGATE (with specific diagnosis of missing knowledge)"
      rules:
        - "NEVER return to BUILD without first reading the full test failure output"
        - "NEVER modify test assertions as the first response to a failure"
        - "The diagnosis must identify a specific root cause, not just 'test failed'"
    output: "E2E diagnostic complete — all tests pass with correct assertions (targeted + full suite)"

  post_test_review:
    description: "Re-review after tests pass — catch issues that testing context reveals"
    steps:
      - "loop:"
      - "  - Re-read ALL new/modified files (fresh eyes after testing)"
      - "  - Review against same checklist as initial review"
      - "  - Fix any issues found"
      - "  - If TWO consecutive passes find no issues → post-test review complete"
      - "Run '/verify-implementation' to verify post-test code against all registered rules"
    output: "Final clean code"

  sync:
    description: "Synchronize contexts, record lessons, present to user"
    gate: true  # must not proceed without user confirmation
    steps:
      - "Reflect on trial-and-error during this issue's work"
      - "Before writing: check if content already exists elsewhere (prevent duplication/scattering)"
      - "loop:"
      - "  - Check if .agents/ needs updates → update"
      - "  - Check if .users/ needs updates → update (1:1 mirror)"
      - "  - Check if entry points (AGENTS.md/CLAUDE.md/GEMINI.md) need updates → update"
      - "Review: were there mistakes or lessons this cycle?"
      - "  YES → add to lessons-learned"
      - "  NO → skip"
      - "Run '/manage-skills' to analyze session changes and update/create verify-* skill coverage"
      - "Present sync summary to user for confirmation"
    rules:
      - "Check existing context files before adding — avoid scattering same content across multiple files"
      - "Lessons from trial-and-error MUST be captured, not just code changes"
    output: "User-confirmed context updates"

  sync_verify:
    description: "Verify context updates are accurate and complete"
    steps:
      - "loop:"
      - "  - Re-read all updated context files"
      - "  - Check accuracy against actual implementation"
      - "  - Check mirror consistency (.agents/ ↔ .users/)"
      - "  - Fix any inaccuracies or missing updates"
      - "  - If TWO consecutive passes find nothing to fix → verification complete"
    output: "Verified, synchronized context files"

  report:
    description: "Report results to user and Issue"
    steps:
      - "Summarize what was done, what changed, and any remaining items"
      - "Post completion status as Issue comment (English)"
    output: "Completion report"

  commit:
    description: "Commit and link to Issue"
    prerequisite: "ALL prior phases (build, review, e2e_test, post_test_review, sync, sync_verify) must be complete before committing"
    steps:
      - "If in worktree: run '/merge-worktree' (squash-merge + naia-os conventional commit + progress.json trailers), then create PR linked to Issue"
      - "If not in worktree: stage relevant files only, write commit message — format: <type>(<scope>): <description> (#<issue>), add trailers as needed, create PR linked to Issue"
    trailer_format:
      Rejected: "<approach> | <reason>"
      Constraint: "<constraint description>"
      Directive: "<warning for future AI modifying this code>"
      "Assisted-by": "<tool name>"
    output: "PR ready for merge"

  close:
    description: "Issue completion verification and close"
    prerequisite: "ALL prior phases including commit must be complete"
    steps:
      - "Lessons learned audit: re-read ALL lessons added during this issue"
      - "  - Check for duplicates against existing lessons (different wording, same root cause)"
      - "  - Check for factual errors (did the fix actually work? is the root cause correct?)"
      - "  - Check ID conflicts (no duplicate IDs with existing lessons)"
      - "  - Remove or merge any problematic entries before posting completion report"
      - "Phase completion audit: verify EVERY phase was executed, not skipped"
      - "  - For each phase (understand → commit): confirm it was done with evidence"
      - "  - Flag any phase that was skipped or partially completed"
      - "  - If any phase is incomplete: go back and complete it before closing"
      - "Test result summary: include final test metrics"
      - "  - Total tests planned vs executed vs passed"
      - "  - Detection rate, false positive rate, and other success criteria"
      - "  - Any deferred/skipped tests with justification"
      - "Post Issue completion comment (gh issue comment) with:"
      - "  1. Phase-by-phase completion checklist (all 14 phases) — each phase: done/skipped/partial with evidence"
      - "  2. Final test results table (planned vs executed vs passed)"
      - "  3. Deliverable list (commits, files, artifacts)"
      - "  4. Lessons learned — new entries added during this issue (IDs and titles)"
      - "  5. Context updates — files added/modified in .agents/, .users/, AGENTS.md"
      - "  6. Known limitations or future work (explicitly separated from 'done')"
      - "User reviews the completion comment and confirms close"
      - "Close the Issue via gh issue close (only after user confirmation)"
    rules:
      - "AI MUST NOT close the issue autonomously — user confirms close"
      - "AI MUST NOT conflate 'implementation complete' with 'issue complete'"
      - "Deferred tests or incomplete phases MUST be listed, not hidden"
      - "If tests are incomplete, the issue stays open until they pass or are explicitly deferred by user"
    output: "Issue closed with full completion record"

# ─── Gates (user confirmation required) ──────────────────────

gates:
  - phase: understand
    prompt: "Is my understanding of this issue correct?"
  - phase: scope
    prompt: "I propose investigating scope L{n} / depth {level}. Does this look right?"
  - phase: plan
    prompt: "Here is my implementation plan. Shall I proceed?"
  - phase: sync
    prompt: "Here are the context updates from this work. Please review before I proceed."
  - phase: close
    prompt: "Completion report posted as Issue comment. Please review and confirm close."

# ─── Progress File (Session Handoff) ─────────────────────────

progress_file:
  location: ".agents/progress/"
  format: JSON
  gitignored: true
  purpose: "Survive context compaction and session boundaries"
  schema:
    required: [issue, title, project, current_phase, updated_at]
    optional: [gate_approvals, decisions, surprises, blockers, rejected_alternatives, constraints_discovered]
  update_points:
    - phase: understand
      trigger: "Gate approved"
      update: "Set current_phase, record gate_approvals.understand"
    - phase: scope
      trigger: "Gate approved"
      update: "Set current_phase, record gate_approvals.scope"
    - phase: plan
      trigger: "Gate approved"
      update: "Set current_phase, record gate_approvals.plan"
    - phase: build
      trigger: "Phase start and each sub-phase completion"
      update: "Set current_phase, record decisions"
    - phase: sync
      trigger: "Gate approved"
      update: "Set current_phase, record gate_approvals.sync"
    - trigger: "Session end (mandatory)"
      update: "Snapshot current state regardless of phase"
    - trigger: "Surprise or blocker discovered"
      update: "Append to surprises[] or blockers[]"
    - trigger: "Approach rejected during investigate or plan"
      update: "Append to rejected_alternatives[] — {approach, reason, date}"
    - trigger: "Constraint discovered during investigate or build"
      update: "Append to constraints_discovered[] — {constraint, scope, date}"
  detail: ".agents/context/harness.yaml"

# ─── Artifact Storage ────────────────────────────────────────

artifact_storage:
  principle: "Intermediate artifacts go to GitHub Issues; permanent knowledge goes to context files"
  rules:
    intermediate:
      location: "GitHub Issue comments"
      includes: ["investigation findings", "plans", "analysis", "decisions in progress"]
      rationale: "Transparent (public), compact-resilient (AI can re-read via gh issue view), no repo bloat"
    final:
      location: ".agents/ context files"
      includes: ["confirmed rules", "architecture decisions", "stable processes"]
      rationale: "Permanent AI context, version-controlled, mirrored to .users/"
    must_not:
      - "Store work-in-progress artifacts in .agents/ (it's for permanent context only)"
      - "Store intermediate plans as files in the repo"

# ─── Work Logs ───────────────────────────────────────────────

work_logs:
  location: "work-logs/ (gitignored, project-internal)"
  convention: "{username}/YYYYMMDD-NN-topic.md"
  language: "Contributor's preferred language"
  purpose: "Personal session notes, detailed progress, native-language thinking"
  backup: "Optional — contributor may git init inside work-logs/ for private backup"
  note: "Key findings and decisions must ALSO be posted to the Issue (English, public)"

# ─── Language Principle ──────────────────────────────────────

language:
  public:
    scope: "Git commits, Issue comments, PR titles/bodies, context files"
    language: "English"
    rationale: "Transparency for global open source community"
  private:
    scope: "work-logs/, personal notes"
    language: "Contributor's preferred language"
    rationale: "Thinking and recording in native language is more effective"
  ai_responses:
    language: "Contributor's preferred language"

# ─── Git Integration ─────────────────────────────────────────

git_integration:
  issue: "Each cycle starts from a GitHub Issue"
  branch_naming: "issue-{number}-{short-description}"
  isolation:
    worktree:
      when: "Default — concurrent work (multiple issues active in the same project)"
      command: "git worktree add ../{project}-issue-{N}-{desc} issue-{N}-{desc}"
      note: "Creates an independent working directory with its own branch. No stash/switch needed."
      cleanup: "After merge into main — remove worktree and delete branch"
      cleanup_commands:
        - "git worktree remove ../{project}-issue-{N}-{desc}"
        - "git branch -d issue-{N}-{desc}"
    branch_only:
      when: "Solo work — only one issue at a time in the repository"
      command: "git checkout -b issue-{N}-{desc}"
  comments: "Investigation results, scope, plan, decisions posted as Issue comments (English)"
  pr: "Links back to Issue on completion"
  transparency: "Full decision trail visible in Issue timeline"
