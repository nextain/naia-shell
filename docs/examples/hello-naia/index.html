<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Hello Naia</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				font-family: system-ui, sans-serif;
				background: #1a1a1e;
				color: #e8e8ea;
			}
			.wrap {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100%;
				gap: 12px;
				box-sizing: border-box;
				padding: 16px;
				text-align: center;
			}
			.emoji {
				font-size: 48px;
			}
			h1 {
				font-size: 20px;
				margin: 0;
			}
			.hint {
				font-size: 12px;
				color: #9a9aa2;
				margin: 0;
			}
			input,
			button {
				font: inherit;
				border-radius: 8px;
				border: 1px solid #34343a;
				padding: 8px 12px;
			}
			input {
				background: #232328;
				color: inherit;
			}
			button {
				background: #3b6fe0;
				color: #fff;
				border-color: transparent;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<div class="emoji">👋</div>
			<h1 id="greeting">Hello, Naia!</h1>
			<p class="hint">The simplest Naia panel. Type a name and say hi.</p>
			<input id="name" placeholder="Your name" />
			<button id="hi">Say hi</button>
		</div>

		<script>
			// Minimal Naia bridge call over postMessage.
			// Full client (queryBehavior/getSecret/readFile/runShell): copy
			// shell/src/lib/naia-bridge-client.ts. See docs/panel-spec.md §6.
			function logBehavior(event, data) {
				const id =
					Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
				window.parent.postMessage(
					{ type: "naia-bridge:logBehavior", id, event, data },
					"*",
				);
			}

			const greeting = document.getElementById("greeting");
			const nameInput = document.getElementById("name");
			document.getElementById("hi").addEventListener("click", () => {
				const name = (nameInput.value || "Naia").trim();
				greeting.textContent = "Hello, " + name + "!";
				logBehavior("said-hi", { name });
			});
		</script>
	</body>
</html>
