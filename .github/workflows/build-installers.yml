name: build installers

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            platform: win32
          - os: ubuntu-24.04
            platform: linux
          - os: macos-15
            platform: darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Clone required public runtime sources
        run: |
          git init ../naia-agent
          git -C ../naia-agent remote add origin https://github.com/nextain/naia-agent.git
          git -C ../naia-agent fetch --depth 1 origin 8afe8d30a69822b7e7acf48da0e0cd0390a4eb67
          git -C ../naia-agent checkout --detach FETCH_HEAD
          git init ../../naia-kb-compiler
          git -C ../../naia-kb-compiler remote add origin https://github.com/nextain/naia-kb-compiler.git
          git -C ../../naia-kb-compiler fetch --depth 1 origin f1ceb075ed5e170d9c2eacb7e06674945d1ad53c
          git -C ../../naia-kb-compiler checkout --detach FETCH_HEAD
          git init ../../naia-memory
          git -C ../../naia-memory remote add origin https://github.com/nextain/naia-memory.git
          git -C ../../naia-memory fetch --depth 1 origin b88f3f0f8eef5cc66e61925774f03be157153efb
          git -C ../../naia-memory checkout --detach FETCH_HEAD

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.23.1"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: "1.97.0"

      - name: Install Linux build and smoke dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libasound2-dev libssl-dev libxdo-dev libudev-dev \
            pipewire-alsa xvfb

      - name: Assert macOS runner architecture
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          test "$(uname -m)" = "arm64" || {
            echo "::error::macOS installer contract currently supports the CI arm64 completion line only"
            exit 1
          }

      - run: pnpm install --frozen-lockfile

      - name: Build installer bundle from platform matrix
        run: pnpm -C packages/shell run tauri:build:bundle

      - name: Verify installer artifacts
        run: node packages/shell/scripts/verify-artifacts.mjs

      - name: Install NSIS and prove bundled Node at runtime
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $installer = Get-ChildItem `
            packages/shell/src-tauri/target/release/bundle/nsis/*-setup.exe |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found"
          }
          $process = Start-Process -FilePath $installer.FullName `
            -ArgumentList "/S" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS silent install failed with exit code $($process.ExitCode)"
          }
          $resourceDir = Join-Path $env:LOCALAPPDATA "Naia"
          $binary = Join-Path $resourceDir "naia-shell.exe"
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) {
            throw "Installed naia-shell.exe not found: $binary"
          }
          if (-not (Test-Path -LiteralPath (Join-Path $resourceDir "node.exe") -PathType Leaf)) {
            throw "Installed bundled node.exe not found: $resourceDir"
          }
          node packages/shell/scripts/verify-installed-smoke.mjs `
            --binary $binary --resource-dir $resourceDir --timeout-ms 120000

      - name: Prepare and verify Steam portable depot
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $resourceDir = Join-Path $env:LOCALAPPDATA "Naia"
          $steamDepot = "packages/shell/src-tauri/target/release/bundle/steam/windows"
          Remove-Item -LiteralPath $steamDepot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $steamDepot -Force | Out-Null
          Get-ChildItem -LiteralPath $resourceDir -Force |
            Where-Object Name -ne "uninstall.exe" |
            Copy-Item -Destination $steamDepot -Recurse -Force

          $binary = Join-Path $steamDepot "naia-shell.exe"
          foreach ($required in @(
            $binary,
            (Join-Path $steamDepot "node.exe"),
            (Join-Path $steamDepot "agent/package.json"),
            (Join-Path $steamDepot "bgm-sidecar/package.json")
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "Steam portable depot is missing required file: $required"
            }
          }
          if (Test-Path -LiteralPath (Join-Path $steamDepot "uninstall.exe")) {
            throw "Steam portable depot must not contain the NSIS uninstaller"
          }

          $manifest = Join-Path $steamDepot "steam-files.sha256"
          Get-ChildItem -LiteralPath $steamDepot -Recurse -File |
            Where-Object FullName -ne $manifest |
            Sort-Object FullName |
            ForEach-Object {
              $relative = [IO.Path]::GetRelativePath($steamDepot, $_.FullName).Replace("\", "/")
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $relative"
            } | Set-Content -LiteralPath $manifest -Encoding utf8NoBOM
          if (-not (Test-Path -LiteralPath $manifest -PathType Leaf) -or
              (Get-Item -LiteralPath $manifest).Length -eq 0) {
            throw "Steam portable depot manifest is missing or empty"
          }

          # Remove the installer-created default location before the portable proof.
          # This prevents the copied executable from passing by reading NSIS machine state.
          $quarantine = Join-Path $env:RUNNER_TEMP "naia-nsis-install"
          Remove-Item -LiteralPath $quarantine -Recurse -Force -ErrorAction SilentlyContinue
          Move-Item -LiteralPath $resourceDir -Destination $quarantine
          if (Test-Path -LiteralPath $resourceDir) {
            throw "NSIS install location still exists before Steam portable smoke"
          }
          try {
            node packages/shell/scripts/verify-installed-smoke.mjs `
              --binary $binary --resource-dir $steamDepot --timeout-ms 120000
            if ($LASTEXITCODE -ne 0) {
              throw "Steam portable smoke failed with exit code $LASTEXITCODE"
            }
          } finally {
            Remove-Item -LiteralPath $quarantine -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Install deb and prove bundled Node at runtime
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          DEB="$(find packages/shell/src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          test -n "$DEB"
          DEB="$(realpath "$DEB")"
          test -f "$DEB"
          sudo apt-get install -y "$DEB"
          BIN="$(command -v naia-shell)"
          RESOURCE_DIR="/usr/lib/naia-shell"
          test -x "$BIN"
          test -x "$RESOURCE_DIR/node"

          WRAPPED_CLAUDE="$RESOURCE_DIR/agent/node_modules/@anthropic-ai/claude-agent-sdk-linux-x64/claude"
          WRAPPED_PAYLOAD="$WRAPPED_CLAUDE.payload.gz"
          WRAPPER_CACHE="$RUNNER_TEMP/naia-wrapper-cache"
          test -x "$WRAPPED_CLAUDE"

          # Two simultaneous first launches must both succeed and converge on one valid cache entry.
          XDG_CACHE_HOME="$WRAPPER_CACHE" "$WRAPPED_CLAUDE" --version &
          WRAPPER_PID_1=$!
          XDG_CACHE_HOME="$WRAPPER_CACHE" "$WRAPPED_CLAUDE" --version &
          WRAPPER_PID_2=$!
          wait "$WRAPPER_PID_1"
          wait "$WRAPPER_PID_2"
          RESTORED_CLAUDE="$(find "$WRAPPER_CACHE/naia/embedded-cli" -name 'claude-*' -type f -perm -u+x -print -quit)"
          test -n "$RESTORED_CLAUDE" || {
            echo "::error::wrapped Claude executable was not restored into the user cache"
            exit 1
          }

          # An executable-but-corrupt cache entry must be detected and repaired.
          printf 'corrupt cache' > "$RESTORED_CLAUDE"
          chmod 700 "$RESTORED_CLAUDE"
          XDG_CACHE_HOME="$WRAPPER_CACHE" "$WRAPPED_CLAUDE" --version

          # A valid gzip containing the wrong executable must fail before publication.
          cp "$WRAPPED_PAYLOAD" "$RUNNER_TEMP/claude.payload.original.gz"
          node -e 'const fs=require("node:fs"),z=require("node:zlib");fs.writeFileSync(process.argv[1],z.gzipSync(Buffer.from("#!/bin/sh\nexit 0\n")))' "$RUNNER_TEMP/claude.payload.tampered.gz"
          sudo cp "$RUNNER_TEMP/claude.payload.tampered.gz" "$WRAPPED_PAYLOAD"
          rm -f "$RESTORED_CLAUDE"
          set +e
          XDG_CACHE_HOME="$WRAPPER_CACHE" "$WRAPPED_CLAUDE" --version
          TAMPER_STATUS=$?
          set -e
          sudo cp "$RUNNER_TEMP/claude.payload.original.gz" "$WRAPPED_PAYLOAD"
          test "$TAMPER_STATUS" -ne 0 || {
            echo "::error::tampered wrapped payload unexpectedly executed"
            exit 1
          }
          echo "wrapped payload tamper probe: expected RED confirmed"

          sudo mv "$RESOURCE_DIR/node" "$RESOURCE_DIR/node.mutation-disabled"
          set +e
          xvfb-run -a node packages/shell/scripts/verify-installed-smoke.mjs \
            --binary "$BIN" --resource-dir "$RESOURCE_DIR" --timeout-ms 120000
          MUTATION_STATUS=$?
          set -e
          sudo mv "$RESOURCE_DIR/node.mutation-disabled" "$RESOURCE_DIR/node"
          test "$MUTATION_STATUS" -ne 0 || {
            echo "::error::mutation probe unexpectedly passed without bundled Node"
            exit 1
          }
          echo "mutation probe: expected RED confirmed"

          xvfb-run -a node packages/shell/scripts/verify-installed-smoke.mjs \
            --binary "$BIN" --resource-dir "$RESOURCE_DIR" --timeout-ms 120000

      - name: Upload installer outputs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: naia-shell-${{ matrix.platform }}-${{ github.sha }}
          path: |
            packages/shell/src-tauri/target/release/bundle/nsis/*-setup.exe
            packages/shell/src-tauri/target/release/bundle/msi/*.msi
            packages/shell/src-tauri/target/release/bundle/deb/*.deb
            packages/shell/src-tauri/target/release/bundle/rpm/*.rpm
            packages/shell/src-tauri/target/release/bundle/appimage/*.AppImage
            packages/shell/src-tauri/target/release/bundle/macos/*.app/Contents/MacOS/*
            packages/shell/src-tauri/target/release/bundle/dmg/*.dmg
            packages/shell/src-tauri/target/release/bundle/artifacts.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload Steam portable depot
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: naia-shell-steam-win32-${{ github.sha }}
          path: packages/shell/src-tauri/target/release/bundle/steam/windows
          if-no-files-found: error
          retention-days: 14
