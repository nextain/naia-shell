    description:
      en: "BGM player — YouTube Music integration with categories, search, and AI voice commands"
      ko: "BGM 플레이어 — 카테고리, 검색, AI 음성 명령을 갖춘 YouTube Music 연동"
  - type: feat
    scope: shell
    issue: 241
    description:
      en: "Windows IME support — Korean 한/영 toggle and diagnostics panel"
      ko: "Windows IME 지원 — 한/영 전환 및 진단 패널"
  - type: feat
