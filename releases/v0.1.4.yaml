    description:
      en: "14-language UI support — Korean, English, Japanese, Chinese, French, German, Russian, Spanish, Arabic, Hindi, Bengali, Portuguese, Indonesian, Vietnamese"
      ko: "14개 언어 UI 지원 — 한국어, 영어, 일본어, 중국어, 프랑스어, 독일어, 러시아어, 스페인어, 아랍어, 힌디어, 벵골어, 포르투갈어, 인도네시아어, 베트남어"
