      ko: "CI 강화 — DLL 명시적 다운로드, 인스톨러 내용 검증, 릴리즈 전 smoke test"
  # ── Runtime Consolidation ──
  - type: refactor
    scope: agent
    issue: 201
    description:
      en: "Consolidated AI runtime — unified gateway architecture with Naia Agent as default"
      ko: "AI 런타임 통합 — Naia Agent를 기본으로 하는 통합 게이트웨이 아키텍처"
