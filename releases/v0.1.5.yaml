version: "0.1.5"
date: "2026-06-05"
summary:
  en: "Naia-0.9-Omni-24g is here — a smart AI that clones your voice, talks in real time, and runs skills, all on a single RTX 3090 PC. This release adds voice tool execution, a redesigned voice-cloning UI with record & preview, natural barge-in, 30-language support, native Ollama local AI, and MS Store & Steam distribution."
  ko: "RTX 3090 PC에서 목소리 복제와 실시간 대화, 스킬까지 가능한 똑똑한 AI — Naia-0.9-Omni-24g 출시. 이번 릴리즈는 음성 대화 중 도구 실행, 녹음·미리듣기를 갖춘 음성 복제 UI 재설계, 자연스러운 끼어들기, 30개국어, 네이티브 Ollama 로컬 AI, MS Store·Steam 배포를 더했습니다."
  ja: "Naia-0.9-Omni-24g が登場 — RTX 3090 PC 1台で、声を複製し、リアルタイムで会話し、スキルまで実行する賢い AI。本リリースでは、音声対話中のツール実行、録音・プレビュー対応の音声複製 UI の刷新、自然な割り込み、30言語対応、ネイティブ Ollama ローカル AI、MS Store・Steam 配信を追加しました。"
  zh: "Naia-0.9-Omni-24g 现已发布 — 一台 RTX 3090 PC 即可克隆你的声音、实时对话并执行技能的智能 AI。本次发布新增语音对话中的工具执行、带录制与预览的全新语音克隆界面、自然插话、30 种语言支持、原生 Ollama 本地 AI，以及 MS Store 与 Steam 分发。"
  fr: "Naia-0.9-Omni-24g est là — une IA intelligente qui clone votre voix, parle en temps réel et exécute des compétences, le tout sur un seul PC RTX 3090. Cette version ajoute l'exécution d'outils en cours de conversation vocale, une interface de clonage vocal repensée avec enregistrement et aperçu, l'interruption naturelle, la prise en charge de 30 langues, l'IA locale native Ollama, ainsi que la distribution via MS Store et Steam."
  de: "Naia-0.9-Omni-24g ist da — eine smarte KI, die deine Stimme klont, in Echtzeit spricht und Skills ausführt, alles auf einem einzigen RTX-3090-PC. Dieses Release ergänzt Tool-Ausführung während des Sprachgesprächs, eine überarbeitete Stimmklon-Oberfläche mit Aufnahme und Vorschau, natürliches Unterbrechen, Unterstützung für 30 Sprachen, native lokale Ollama-KI sowie Distribution über MS Store und Steam."
  ru: "Naia-0.9-Omni-24g уже здесь — умный ИИ, который клонирует ваш голос, общается в реальном времени и выполняет навыки, и всё это на одном ПК с RTX 3090. В этом релизе добавлены выполнение инструментов во время голосового разговора, переработанный интерфейс клонирования голоса с записью и предпрослушиванием, естественное прерывание, поддержка 30 языков, нативный локальный ИИ Ollama, а также распространение через MS Store и Steam."
  es: "Naia-0.9-Omni-24g ya está aquí — una IA inteligente que clona tu voz, habla en tiempo real y ejecuta habilidades, todo en un solo PC con RTX 3090. Esta versión añade la ejecución de herramientas durante la conversación por voz, una interfaz de clonación de voz rediseñada con grabación y vista previa, interrupción natural, compatibilidad con 30 idiomas, IA local nativa con Ollama y distribución en MS Store y Steam."
  ar: "Naia-0.9-Omni-24g وصل — ذكاء اصطناعي ذكي يستنسخ صوتك، ويتحدث في الوقت الفعلي، وينفّذ المهارات، كل ذلك على جهاز RTX 3090 واحد. يضيف هذا الإصدار تنفيذ الأدوات أثناء المحادثة الصوتية، وواجهة معاد تصميمها لاستنساخ الصوت مع التسجيل والمعاينة، والمقاطعة الطبيعية، ودعم 30 لغة، وذكاء Ollama المحلي الأصلي، والتوزيع عبر MS Store وSteam."
  hi: "Naia-0.9-Omni-24g आ गया है — एक स्मार्ट AI जो आपकी आवाज़ की नकल करता है, रीयल-टाइम में बात करता है और स्किल्स चलाता है, वह भी सिर्फ़ एक RTX 3090 PC पर। इस रिलीज़ में वॉइस बातचीत के दौरान टूल निष्पादन, रिकॉर्ड और प्रीव्यू वाली नई वॉइस-क्लोनिंग UI, स्वाभाविक रूप से बीच में बोलना, 30 भाषाओं का समर्थन, नेटिव Ollama लोकल AI, और MS Store व Steam वितरण जोड़ा गया है।"
  bn: "Naia-0.9-Omni-24g এসে গেছে — একটি স্মার্ট AI যা আপনার কণ্ঠস্বর ক্লোন করে, রিয়েল-টাইমে কথা বলে এবং স্কিল চালায়, সবই একটিমাত্র RTX 3090 PC-তে। এই রিলিজে যুক্ত হয়েছে ভয়েস কথোপকথনের সময় টুল চালানো, রেকর্ড ও প্রিভিউ সহ নতুন করে ডিজাইন করা ভয়েস-ক্লোনিং UI, স্বাভাবিকভাবে মাঝে কথা বলা, ৩০টি ভাষার সমর্থন, নেটিভ Ollama লোকাল AI, এবং MS Store ও Steam বিতরণ।"
  pt: "Naia-0.9-Omni-24g chegou — uma IA inteligente que clona a sua voz, fala em tempo real e executa skills, tudo num único PC com RTX 3090. Esta versão adiciona execução de ferramentas durante a conversa por voz, uma interface de clonagem de voz reformulada com gravação e pré-visualização, interrupção natural, suporte a 30 idiomas, IA local nativa com Ollama e distribuição na MS Store e Steam."
  id: "Naia-0.9-Omni-24g hadir — AI cerdas yang mengkloning suara Anda, berbicara secara real-time, dan menjalankan skill, semuanya di satu PC RTX 3090. Rilis ini menambahkan eksekusi alat saat percakapan suara, antarmuka kloning suara yang didesain ulang dengan rekam & pratinjau, interupsi alami, dukungan 30 bahasa, AI lokal Ollama native, serta distribusi MS Store & Steam."
  vi: "Naia-0.9-Omni-24g đã ra mắt — một AI thông minh có thể nhân bản giọng nói của bạn, trò chuyện theo thời gian thực và chạy các kỹ năng, tất cả trên một chiếc PC RTX 3090 duy nhất. Bản phát hành này bổ sung khả năng thực thi công cụ trong khi trò chuyện bằng giọng nói, giao diện nhân bản giọng nói được thiết kế lại với ghi âm & nghe thử, ngắt lời tự nhiên, hỗ trợ 30 ngôn ngữ, AI cục bộ Ollama gốc, cùng phân phối qua MS Store & Steam."
