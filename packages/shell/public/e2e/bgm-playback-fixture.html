<!doctype html>
<html lang="en"><meta charset="utf-8" /><title>Naia BGM E2E fixture</title>
<body>
<button id="report-playing" type="button">Report playing</button>
<button id="report-ended" type="button">Report ended</button>
<script>
(() => {
 const send = (event, info) => parent.postMessage(JSON.stringify({ event, info }), window.location.origin);
 send('initialDelivery', 0);
 document.querySelector('#report-playing').addEventListener('click', () => send('onStateChange', 1));
 document.querySelector('#report-ended').addEventListener('click', () => send('onStateChange', 0));
})();
</script>
</body></html>
