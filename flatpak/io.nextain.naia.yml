app-id: io.nextain.naia
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.llvm20
# naia-launch picks GDK_BACKEND per session (wayland session -> wayland so the
# main window renders; x11 session -> x11 so browser-panel Chrome embedding works).
# Forcing GDK_BACKEND=x11 globally made the main window map at 1x1 on KDE Wayland.
command: naia-launch
finish-args:
  - --share=ipc
  # x11 socket kept (XWayland) — required for Chrome XReparentWindow embedding on X11 sessions.
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications
  - --own-name=io.nextain.naia.*
  - --env=FLATPAK=1
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin:/usr/lib/sdk/llvm20/bin
  env:
    LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
  build-args:
    - --share=network
modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: Naia-OS
    buildsystem: simple
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - .flatpak-builder
          - flatpak-repo
          - build-dir
          - shell/src-tauri/target
          - shell/node_modules
          - agent/node_modules
          - agent/dist
      # yt-dlp standalone binary — YouTube BGM stream extraction (#262).
      - type: file
        url: https://github.com/yt-dlp/yt-dlp/releases/download/2026.06.09/yt-dlp_linux
        sha256: bf8aac79b72287a6d2043074415132558b43743a8f9461a22b0141e90f16ce66
        dest-filename: yt-dlp
    build-options:
      env:
        CARGO_HOME: /run/build/Naia-OS/cargo
        CI: "true"
    build-commands:
      # Pin pnpm v10 because pnpm v11 applies stricter supply-chain checks
      # to vendored workspace tarballs and breaks the CI Flatpak build.
      - cd agent && npx --yes pnpm@10.33.4 install --no-frozen-lockfile --shamefully-hoist
      - cd agent && npx --yes pnpm@10.33.4 exec tsc
      # Shell frontend + Tauri binary (tauri build embeds frontend properly for WebKitGTK)
      # 1. pnpm install + vite build (frontend dist)
      # 2. tauri build --no-bundle with beforeBuildCommand disabled (already built above)
      - cd shell && npx --yes pnpm@10.33.4 install --no-frozen-lockfile
      - cd shell && npx --yes pnpm@10.33.4 run build
      - cd shell && npx tauri build --no-bundle --config src-tauri/tauri.conf.flatpak.json
      # Install binary
      - install -Dm755 shell/src-tauri/target/release/naia-shell /app/bin/naia-os
      # Launcher wrapper: selects GDK_BACKEND per session (see flatpak/naia-launch.sh).
      - install -Dm755 flatpak/naia-launch.sh /app/bin/naia-launch
      # Vosk STT shared library (tauri-plugin-stt dynamically links libvosk.so).
      # Vendored in shell/src-tauri/resources; /app/lib is on the flatpak LD path.
      # Without this the binary fails at startup: "libvosk.so: cannot open shared object file".
      - install -Dm755 shell/src-tauri/resources/libvosk.so /app/lib/libvosk.so
      # Node.js runtime (for agent)
      - install -Dm755 /usr/lib/sdk/node22/bin/node /app/bin/node
      # yt-dlp (YouTube BGM stream URLs — InnerTube is po_token-walled, #262)
      - install -Dm755 yt-dlp /app/bin/yt-dlp
      # Agent bundle (dist + node_modules for runtime)
      - mkdir -p /app/lib/naia-os/agent
      - cp -rL agent/dist /app/lib/naia-os/agent/dist
      - cp -rL agent/node_modules /app/lib/naia-os/agent/node_modules
      - cp agent/package.json /app/lib/naia-os/agent/
      # OpenClaw Gateway removed in #201 — naia-agent handles tools directly.
      # No daemon to bundle. config/defaults/openclaw-bootstrap.json was used
      # by the legacy gateway-spawn path; gone via #271 Phase 1.
      # Desktop integration
      - install -Dm644 flatpak/io.nextain.naia.desktop /app/share/applications/io.nextain.naia.desktop
      - install -Dm644 flatpak/io.nextain.naia.metainfo.xml /app/share/metainfo/io.nextain.naia.metainfo.xml
      # Icons
      - install -Dm644 shell/src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.nextain.naia.png
      - install -Dm644 shell/src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/io.nextain.naia.png
      - install -Dm644 shell/src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.nextain.naia.png
      - install -Dm644 shell/src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.nextain.naia.png
      - install -Dm644 shell/src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/io.nextain.naia.png
